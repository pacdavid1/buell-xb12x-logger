<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sector DAGs — Buell Logger</title>
<style>
  :root {
    --bg: #0a0a0b; --panel: #111114; --accent: #e8420a; --fg: #d8d8dc; --muted: #7a7a80;
    --c-raw: #3ddc84; --c-proc: #4a9eff; --c-out: #e8b923; --c-unused: #6b6b70; --c-gap: #ff5c5c; --c-loop: #b06fe0;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }

  /* Top bar */
  #topbar {
    position: fixed; top:0; left:0; right:0; height:48px; background: var(--panel);
    border-bottom: 1px solid #222; display:flex; align-items:center; gap:8px;
    padding: 0 12px; z-index: 100; overflow-x: auto;
  }
  #topbar h1 { font-size: 13px; color: var(--accent); letter-spacing:1px; white-space:nowrap; margin-right: 8px; }
  .sbtn {
    padding: 4px 10px; border: 1px solid #333; border-radius: 4px;
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 10px; white-space: nowrap; transition: all 0.12s; flex-shrink:0;
  }
  .sbtn:hover { border-color: #555; color: var(--fg); }
  .sbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #legend {
    display:flex; gap:6px; font-size:9px; margin-left:auto; flex-shrink:0;
  }
  .ldot { width:8px; height:8px; border-radius:2px; display:inline-block; margin-right:2px; }

  /* Canvas */
  #canvas-wrap {
    position: fixed; top:48px; left:0; right:320px; bottom:0; overflow:hidden;
    cursor:grab;
  }
  #canvas-wrap.dragging { cursor:grabbing; }
  #canvas-wrap.panel-hidden { right:0; }

  /* SVG */
  #graph-svg { display: block; }
  .node { cursor:pointer; }
  .node rect { transition: stroke-width 0.12s, filter 0.12s; }
  .node:hover rect { filter: brightness(1.3); }
  .node.hi rect:first-of-type { stroke-width: 3; }
  .node.dim { opacity: 0.1; }
  .node.upstream rect:first-of-type { filter: drop-shadow(0 0 6px #4a9eff); }
  .node.downstream rect:first-of-type { filter: drop-shadow(0 0 6px #e8420a); }
  .edge { transition: opacity 0.12s; }
  .edge.dim { opacity: 0.04 !important; }
  .edge.hi { opacity: 1 !important; stroke-width: 2.5 !important; }

  /* Side panel */
  #sidepanel {
    position: fixed; top:48px; right:0; bottom:0; width:320px;
    background: var(--panel); border-left: 1px solid #222;
    padding: 12px; overflow-y:auto; font-size:11px;
    transition: transform 0.15s;
  }
  #sidepanel.hidden { transform: translateX(320px); }
  #panel-toggle { background:var(--panel); color:var(--fg); border:1px solid #333; font-size:9px; padding:3px 6px; cursor:pointer; }
  #sidepanel h2 { font-size:12px; color: var(--accent); word-break:break-all; margin-bottom:6px; }
  #sidepanel .fl { color: var(--muted); font-size:9px; text-transform:uppercase; margin-top:6px; }
  #sidepanel .fv { margin-bottom:4px; }
  #sidepanel .er { font-size:10px; padding:2px 4px; cursor:pointer; border-radius:2px; word-break:break-all; }
  #sidepanel .er:hover { background:#1c1c22; }
  #sidepanel .empty { color: var(--muted); font-size:10px; }

  /* Zoom controls */
  #zoomctl {
    position: fixed; bottom:8px; right:328px; z-index:90; display:flex; gap:4px;
  }
  #zoomctl button {
    background: var(--panel); color: var(--fg); border: 1px solid #333;
    width: 24px; height: 24px; cursor: pointer; font-size: 11px;
  }
  #zoomctl button.wide { width:auto; padding:0 6px; font-size:9px; }

  .sector-tag {
    font-size:8px; fill: var(--muted); letter-spacing:1px; text-transform:uppercase;
  }

  @media (max-width:700px) {
    #sidepanel { width:260px; }
    #canvas-wrap { right:260px; }
    #zoomctl { right:268px; }
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>SECTOR DAGS</h1>
  <button class="sbtn active" data-sector="all">🌐 ALL</button>
  <button class="sbtn" data-sector="fuel-trim">🏁 Fuel Trim</button>
  <button class="sbtn" data-sector="vdyno">🔥 VDYNO</button>
  <button class="sbtn" data-sector="launch">🚀 Launch</button>
  <button class="sbtn" data-sector="map-editor">🗺️ Map Editor</button>
  <button class="sbtn" data-sector="coverage">📊 Coverage</button>
  <button class="sbtn" data-sector="fuel">⛽ Fuel</button>
  <button class="sbtn" data-sector="captured-unused">🚫 Unused</button>
  <div id="legend">
    <span><span class="ldot" style="background:var(--c-raw)"></span>RAW</span>
    <span><span class="ldot" style="background:var(--c-proc)"></span>PROCESS</span>
    <span><span class="ldot" style="background:var(--c-out)"></span>OUTPUT</span>
    <span><span class="ldot" style="background:var(--c-unused)"></span>UNUSED</span>
  </div>
  <button id="panel-toggle">☰</button>
</div>

    <defs>
      <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9a9aa0"/></marker>

      <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff5c5c"/></marker>
      <marker id="ar-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#e8b923"/></marker>
      <marker id="ar-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#b06fe0"/></marker>
    </defs>
    <g id="pan-group">
      <!-- All content is injected by JavaScript -->
    </g>
  </svg>
</div>

<div id="sidepanel">
  <p class="empty">Click a node to inspect it</p>
</div>

<div id="zoomctl">
  <button id="zin">+</button>
  <button id="zout">−</button>
  <button id="zreset" class="wide">1:1</button>
</div>

      ['u_dirty','u_csv'], ['u_batt','u_csv'], ['u_humidity','u_csv'],
      ['u_diag','u_csv'], ['u_o2','u_csv'], ['u_ego','u_csv'],
      ['u_rider','u_csv'], ['u_imu','u_csv'], ['u_bas','u_csv'],
      ['u_csv','u_errorlog'], ['u_dirty','u_errorlog'],
      ['u_csv','u_tuning_rpt'], ['u_ego','u_tuning_rpt'],
      ['u_errorlog','u_errorlog_viz'],
      ['u_tuning_rpt','u_suggested'],
      ['u_impact','u_errorlog_viz'],
    ]
  }
};

// ── RENDER ────────────────────────────────────────────────────────
const panGroup = document.getElementById('pan-group');
const sidepanel = document.getElementById('sidepanel');
const DEFAULT_PANEL = sidepanel.innerHTML;

const nodeById = {};
let scale = 0.75, panX = 60, panY = 20;
let activeSector = 'all';

function renderSector(sectorId) {
  const data = SECTORS[sectorId];
  if (!data) return '';
  let svg = '';

  // Sector background label
  svg += `<text x="40" y="30" font-size="14" fill="#e8420a" font-family="'Segoe UI',sans-serif" font-weight="600">${data.label}</text>`;

  // Edges
  for (const [src,dst] of data.edges) {
    const sn = data.nodes.find(n=>n.id===src);
    const dn = data.nodes.find(n=>n.id===dst);
    if (!sn || !dn) continue;
    const x1 = sn.x + sn.w, y1 = sn.y + sn.h/2;
    const x2 = dn.x, y2 = dn.y + dn.h/2;
    const dx = Math.max(20, (x2 - x1) / 2);
    const path = `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;
    const color = '#9a9aa0';
    svg += `<path class="edge" data-sid="${sectorId}" data-src="${src}" data-dst="${dst}" d="${path}" stroke="${color}" stroke-width="1.4" fill="none" opacity="0.5" marker-end="url(#ar-gray)"/>`;
  }

  // Nodes
  for (const n of data.nodes) {
    const color = NODE_COLORS[n.type] || '#888';
    const typeLabel = NODE_LABELS[n.type] || n.type.toUpperCase();
    const rx=5, ry=5;
    svg += `<g class="node" data-sid="${sectorId}" data-id="${n.id}" data-type="${n.type}" data-detail="${esc(n.detail)}" transform="translate(${n.x},${n.y})">`;
    svg += `<rect width="${n.w}" height="${n.h}" rx="${rx}" fill="#15151a" stroke="${color}" stroke-width="1.5"/>`;
    svg += `<rect width="${n.w}" height="14" rx="${rx}" fill="${color}" opacity="0.15"/>`;
    svg += `<text x="5" y="10" font-size="7" fill="${color}" font-family="monospace">${typeLabel}</text>`;
    svg += `<text x="5" y="24" font-size="9" fill="#d8d8dc" font-family="'Segoe UI',sans-serif">${esc(n.label)}</text>`;
    svg += `</g>`;
  }

  return svg;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAll() {
  let html = '';
  // Collect unique Y offsets per sector
  let yOff = 0;
  for (const [sid, data] of Object.entries(SECTORS)) {
    const group = document.createElementNS('http://www.w3.org/2000/svg','g');
    // We'll just build string and compute bounding box
    const nodes = data.nodes;
    const maxY = Math.max(...nodes.map(n=>n.y + n.h)) + 40;
    const minX = Math.min(...nodes.map(n=>n.x)) - 20;
    
    html += `<g id="sector-group-${sid}" data-sector="${sid}">`;
    html += renderSector(sid);
    html += `</g>`;
  }
  panGroup.innerHTML = html;
  applyVisibility();
}

function applyVisibility() {
  const groups = document.querySelectorAll('[id^="sector-group-"]');
  groups.forEach(g => {
    const sid = g.dataset.sector;
    g.style.display = (activeSector === 'all' || activeSector === sid) ? '' : 'none';
  });
}

// ── INTERACTION ───────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const svg = document.getElementById('graph-svg');

let panning = false, lastX=0, lastY=0, startX=0, startY=0, moved=false;

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  panning = true; lastX=e.clientX; lastY=e.clientY;
  startX=e.clientX; startY=e.clientY; moved=false;
  wrap.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  if (Math.abs(e.clientX-startX)>3 || Math.abs(e.clientY-startY)>3) moved=true;
  panX += e.clientX-lastX; panY += e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  if (panning && !moved) clearSelection();
  panning=false; wrap.classList.remove('dragging');
});
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    const f = Math.exp(-Math.max(-60,Math.min(60,e.deltaY))*0.012);
    scale = Math.min(3, Math.max(0.15, scale*f));
  } else { panX -= e.deltaX; panY -= e.deltaY; }
  applyTransform();
}, {passive:false});

document.getElementById('zin').onclick = ()=>{scale=Math.min(3,scale*1.2);applyTransform();};
document.getElementById('zout').onclick = ()=>{scale=Math.max(0.15,scale/1.2);applyTransform();};
document.getElementById('zreset').onclick = ()=>{scale=0.75;panX=60;panY=20;applyTransform();};

function applyTransform() {
  panGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
}

// ── SELECTION ─────────────────────────────────────────────────────
function clearSelection() {
  document.querySelectorAll('.node').forEach(x=>x.classList.remove('hi','dim','upstream','downstream'));
  document.querySelectorAll('.edge').forEach(x=>x.classList.remove('hi','dim'));
  sidepanel.innerHTML = DEFAULT_PANEL;
}

function selectNode(id) {
  const el = document.querySelector(`.node[data-id="${id}"]`);
  if (!el) return;

  // Build adjacency within same sector
  const sid = el.dataset.sector;
  const succ={}, pred={};
  document.querySelectorAll(`.edge[data-sid="${sid}"]`).forEach(e => {
    const s=e.dataset.src, d=e.dataset.dst;
    (succ[s]=succ[s]||[]).push(d); (pred[d]=pred[d]||[]).push(s);
  });

  function bfs(start, adj) {
    const vis=new Set([start]); const q=[start];
    while (q.length) {
      const u=q.shift();
      for (const v of (adj[u]||[])) { if (!vis.has(v)) { vis.add(v); q.push(v); } }
    }
    vis.delete(start); return vis;
  }

  const upstream = bfs(id, pred);
  const downstream = bfs(id, succ);
  const relevant = new Set([id,...upstream,...downstream]);

  document.querySelectorAll('.node').forEach(x => {
    x.classList.remove('hi','dim','upstream','downstream');
    const xid = x.dataset.id;
    if (xid===id) x.classList.add('hi');
    else if (upstream.has(xid)) x.classList.add('upstream');
    else if (downstream.has(xid)) x.classList.add('downstream');
    else if (x.dataset.sector===sid) x.classList.add('dim');
  });
  document.querySelectorAll('.edge').forEach(x => {
    const direct = x.dataset.src===id || x.dataset.dst===id;
    const chain = relevant.has(x.dataset.src) && relevant.has(x.dataset.dst);
    x.classList.toggle('hi', direct||chain);
    x.classList.toggle('dim', !(direct||chain));
  });

  // Side panel
  const detail = el.dataset.detail || '';
  const out=[], inn=[];
  document.querySelectorAll(`.edge[data-sid="${sid}"]`).forEach(x => {
    if (x.dataset.src===id) out.push(x.dataset.dst);
    if (x.dataset.dst===id) inn.push(x.dataset.src);
  });
  const typeColor = NODE_COLORS[el.dataset.type] || '#888';
  sidepanel.innerHTML = `
    <h2>${id}</h2>
    <div class="fl">type</div><div class="fv" style="color:${typeColor}">${el.dataset.type}</div>
    <div class="fl">detail</div><div class="fv">${esc(detail)}</div>
    <div class="fl">full upstream chain — ${upstream.size} node(s)</div>
    ${upstream.size ? [...upstream].map(u=>`<div class="er" data-jump="${u}">← ${u}</div>`).join('') : '<div class="empty">(none)</div>'}
    <div class="fl">full downstream chain — ${downstream.size} node(s)</div>
    ${downstream.size ? [...downstream].map(d=>`<div class="er" data-jump="${d}">→ ${d}</div>`).join('') : '<div class="empty">(none)</div>'}
    <div class="fl">feeds into (direct)</div>
    ${inn.length ? inn.map(i=>`<div class="er" data-jump="${i}">← ${i}</div>`).join('') : '<div class="empty">(none)</div>'}
    <div class="fl">feeds to (direct)</div>
    ${out.length ? out.map(o=>`<div class="er" data-jump="${o}">→ ${o}</div>`).join('') : '<div class="empty">(none)</div>'}
  `;
  sidepanel.querySelectorAll('.er').forEach(row => {
    row.onclick = () => selectNode(row.dataset.jump);
  });
}

// Click node
document.addEventListener('click', e => {
  const nodeEl = e.target.closest('.node');
  if (!nodeEl) return;
  selectNode(nodeEl.dataset.id);
});

// ── SECTOR NAV ────────────────────────────────────────────────────
document.querySelectorAll('[data-sector]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeSector = btn.dataset.sector;
    document.querySelectorAll('[data-sector]').forEach(b => b.classList.toggle('active', b.dataset.sector===activeSector));
    applyVisibility();

    // Auto-pan to sector center
    const firstNode = document.querySelector(`[id^="sector-group-${activeSector}"] .node`);
    if (firstNode && activeSector !== 'all') {
      const x = parseFloat(firstNode.getAttribute('transform')?.match(/translate\(([^,]+)/)?.[1] || 0);
      const y = parseFloat(firstNode.getAttribute('transform')?.match(/translate\([^,]+,\s*([^)]+)/)?.[1] || 0);
      panX = wrap.clientWidth/2 - x*scale - 100;
      panY = wrap.clientHeight/2 - y*scale - 80;
      applyTransform();
    }
    clearSelection();
  });
});

document.getElementById('panel-toggle').onclick = () => {
  const hidden = sidepanel.classList.toggle('hidden');
  wrap.classList.toggle('panel-hidden', hidden);
};

// ── INIT ──────────────────────────────────────────────────────────
renderAll();
applyTransform();
</script>
