<!DOCTYPE html>
<!-- DEV NOTE: All code, comments, and variable names must be in English. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GRAF2 · Buell Telemetry</title>
<link rel="stylesheet" href="/static/uPlot.min.css">
<style>
  :root{
    --bg:#0a0a0b; --panel:#111114; --panel2:#16161a; --border:#222;
    --fg:#d8d8d8; --dim:#777; --accent:#e8420a; --grid:rgba(255,255,255,.05);
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:12px}
  a{color:var(--accent);text-decoration:none}

  /* ---- top bar ---- */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;
    padding:8px 10px;background:linear-gradient(180deg,#101013,#0d0d10);
    border-bottom:1px solid var(--border);flex-wrap:wrap}
  .brand{color:var(--accent);font-weight:700;letter-spacing:2px;font-size:12px;margin-right:6px}
  .ver{color:var(--dim);font-size:9px}
  select,button,input{font-family:var(--mono);font-size:11px;color:var(--fg);
    background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:5px 8px}
  button{cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
  .nav{margin-left:auto;display:flex;gap:10px;font-size:10px}
  .nav a{color:var(--dim)} .nav a:hover{color:var(--accent)}
  .status{color:var(--dim);font-size:10px;min-width:120px}

  /* ---- blocks ---- */
  #blocks{padding:10px;display:flex;flex-direction:column;gap:10px}
  .block{background:var(--panel);border:1px solid var(--border);border-radius:4px;
    position:relative;overflow:hidden}
  .block.dragover{border-color:var(--accent)}
  .block-head{display:flex;align-items:center;gap:8px;padding:5px 8px;
    background:var(--panel2);border-bottom:1px solid var(--border);cursor:grab}
  .block-head:active{cursor:grabbing}
  .block-title{color:var(--dim);font-size:10px;letter-spacing:1px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;flex:1}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:1px 6px;border-radius:10px;
    background:#1c1c20;font-size:9px;cursor:pointer;border:1px solid transparent}
  .chip:hover{border-color:var(--accent)}
  .chip .dot{width:7px;height:7px;border-radius:2px}
  .chip .cval{color:#fff;font-weight:700;min-width:18px;text-align:right;font-variant-numeric:tabular-nums}
  .chip .lane{color:var(--dim);cursor:pointer;padding:0 2px;font-weight:700}
  .chip .lane:hover{color:var(--accent)}
  .chip .lane.on{color:var(--accent)}
  .chip .x{color:var(--dim);font-weight:700;margin-left:2px;padding:0 1px}
  .chip .x:hover{color:var(--accent)}
  .chip.off{opacity:.45}
  .chip.off .cname{text-decoration:line-through}
  .chip.off .cval{color:#555}
  .block-chips{display:flex;gap:4px;flex-wrap:wrap;flex:2;overflow:hidden}
  .block-btns{display:flex;gap:4px}
  .iconbtn{padding:2px 7px;font-size:11px;line-height:1}
  .uwrap{position:relative}
  .resize{height:8px;cursor:ns-resize;background:repeating-linear-gradient(90deg,#222 0 6px,transparent 6px 12px);
    opacity:.5} .resize:hover{opacity:1;background:var(--accent)}

  /* ---- signal picker modal ---- */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;
    align-items:center;justify-content:center}
  .modal.open{display:flex}
  .picker{background:var(--panel);border:1px solid var(--accent);border-radius:5px;
    width:min(520px,94vw);max-height:84vh;display:flex;flex-direction:column}
  .picker-head{display:flex;align-items:center;gap:8px;padding:10px;border-bottom:1px solid var(--border)}
  .picker-head .t{color:var(--accent);font-size:11px;letter-spacing:1px;flex:1}
  .search{flex:1}
  .picker-body{overflow-y:auto;padding:6px 10px}
  .picker-body textarea{width:100%;background:var(--panel2);color:var(--fg);border:1px solid var(--border);border-radius:3px;font-family:var(--mono);font-size:11px;padding:6px;resize:vertical}
  .grp{color:var(--dim);font-size:9px;letter-spacing:2px;margin:10px 0 4px;text-transform:uppercase}
  .sig{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:3px;cursor:pointer}
  .sig:hover{background:var(--panel2)}
  /* ---- floating cursor readout ---- */
  #cur-readout{position:fixed;right:8px;top:70px;z-index:20;background:rgba(12,12,16,.93);border:1px solid #2a2a2e;border-radius:4px;padding:5px 8px;font:9px/1.5 var(--mono);color:#999;pointer-events:none;min-width:110px;max-height:60vh;overflow-y:auto;display:none;transition:left .12s,right .12s}
  #cur-readout .cr-t{color:var(--accent);font-weight:700;border-bottom:1px solid #222;margin-bottom:2px;padding-bottom:2px}
  #cur-readout .cr-r{display:flex;gap:5px;align-items:center}
  #cur-readout .cr-d{width:6px;height:6px;border-radius:2px;flex:none}
  #cur-readout .cr-k{flex:1;color:#666;max-width:90px;overflow:hidden;text-overflow:ellipsis}
  #cur-readout .cr-v{font-weight:700;color:#ddd;text-align:right;min-width:28px}
  .sig.on{background:rgba(232,66,10,.12)}
  .sig .dot{width:9px;height:9px;border-radius:2px;flex:none}
  .sig .k{flex:1}
  .sig .u{color:var(--dim);font-size:9px}
  .picker-foot{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

  .hint{color:var(--dim);font-size:9px;padding:0 10px}
  .empty{color:var(--dim);text-align:center;padding:40px;font-size:11px}
  .u-legend{font-size:10px}
  .u-legend .u-marker{width:9px!important;height:9px!important}
  /* touch: 2-finger vertical = page scroll; pinch + horizontal captured in JS */
  .uwrap,.uplot,.u-wrap,.u-over{touch-action:pan-y}
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">GRAF2</span><span class="ver">--LOGGER_VERSION--</span>
    <select id="rideSel"><option value="">-- ride --</option></select>
    <button id="loadBtn" class="accent">LOAD</button>
    <button id="addBlock">+ Block</button>
    <button id="markBtn" title="mark a time span for F7">🔖 Mark</button>
    <button id="marksBtn" title="manage marks">marks</button>
    <button id="yfitBtn" title="Y axis: full = fixed to ride range (absolute), fit = auto-scale to visible">Y: full</button>
    <label style="color:var(--dim);font-size:10px">flag&nbsp;shade</label>
    <select id="flagShade"><option value="">none</option></select>
    <select id="presetSel"><option value="">preset…</option></select>
    <span id="status" class="status">no ride loaded</span>
    <nav class="nav">
      <a href="/">Dashboard</a><a href="/session_events">Events</a>
      <a href="/sessions_vs">VS</a><a href="/tuner">Tuner</a>
    </nav>
  </div>

  <div class="hint">pinch = zoom (all blocks follow) · 2-finger sideways = pan time · 2-finger up/down = scroll page · double-click = reset · drag header = reorder · drag bottom edge = resize height</div>
  <div id="blocks"><div class="empty">Load a ride to start.</div></div>

  <!-- signal picker -->
  <div class="modal" id="pickerModal">
    <div class="picker">
      <div class="picker-head">
        <span class="t" id="pickerTitle">SIGNALS</span>
        <input class="search" id="pickerSearch" placeholder="search signal… (rpm, pw, fl_hot, fan)" autocomplete="off">
        <span id="pickerClose" style="cursor:pointer;color:var(--dim);padding:0 4px">✕</span>
      </div>
      <div class="picker-body" id="pickerBody"></div>
      <div class="picker-foot">
        <button id="pickerClear">clear</button>
        <button id="pickerApply" class="accent">apply</button>
      </div>
    </div>
  </div>

  <div id="cur-readout"></div>
  <script src="/static/uPlot.iife.min.js"></script>
  <script src="/static/graf2.js"></script>
</body>
</html>
