<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>GPS Analysis — Buell Logger</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="/static/uPlot.min.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/uPlot.iife.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0b;color:#c8c8cc;font-family:'JetBrains Mono',Consolas,monospace;
     height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:6px;padding:4px 8px;background:#111116;
         border-bottom:1px solid #1e1e28;flex-shrink:0;height:40px;flex-wrap:wrap}
#toolbar a{color:#55555e;font-size:9px;text-decoration:none;white-space:nowrap}
#toolbar a:hover{color:#aaa}
#toolbar select{background:#0a0a0b;border:1px solid #2a2a36;color:#c8c8cc;font-family:inherit;
                font-size:9px;padding:3px 6px;border-radius:2px;flex:1;min-width:140px;max-width:240px}
.btn{background:transparent;border:1px solid #2a2a36;color:#c8c8cc;font-family:inherit;font-size:9px;
     padding:3px 8px;border-radius:2px;cursor:pointer;white-space:nowrap}
.btn:hover{border-color:#555;color:#fff}
.btn.on{border-color:#3d9eff;color:#3d9eff}
#statsBar{font-size:8px;color:#55555e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
#qualityStrip{width:100%;height:8px;flex-shrink:0;display:block;cursor:crosshair}
#mapsRow{flex:1;display:flex;min-height:0}
#map2d{flex:1;min-width:0}
#map3d{flex:1;min-width:0;display:block;touch-action:none;cursor:grab;background:#0a0a0b}
#chartWrap{height:22dvh;flex-shrink:0;background:#0a0a0b;border-top:1px solid #1e1e28;position:relative}
#chartTitle{position:absolute;top:3px;left:8px;font-size:8px;color:#55555e;z-index:2;pointer-events:none}
#chartCtrls{position:absolute;top:2px;right:6px;display:flex;gap:3px;z-index:2}
#statsRow{flex-shrink:0;height:20px;background:#111116;border-top:1px solid #1e1e28;
          display:flex;align-items:center;gap:0;overflow:hidden}
.stat-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
           border-right:1px solid #1e1e28;padding:1px 4px;min-width:0}
.stat-cell:last-child{border-right:none}
.stat-label{font-size:6px;color:#55555e;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.stat-val{font-size:9px;font-weight:700;white-space:nowrap;line-height:1}
.leaflet-container{background:#0a0a0b}
.u-cursor-x,.u-cursor-y{opacity:.4}
</style>
</head>
<body>
<div id="toolbar">
  <a href="/">← Dash</a>
  <select id="rideSelect"><option value="">-- Select ride --</option></select>
  <button class="btn" id="loadBtn" onclick="loadData()" style="border-color:#3d9eff;color:#3d9eff">Load</button>
  <button class="btn" id="heatBtn" onclick="toggleHeat()" title="Speed heatmap">Heat</button>
  <button class="btn" id="spinBtn" onclick="toggleSpin()" title="Highlight spin events">Spin</button>
  <span id="statsBar">Select a ride and press Load</span>
</div>

<canvas id="qualityStrip" height="8"></canvas>

<div id="mapsRow">
  <div id="map2d"></div>
  <canvas id="map3d" touch-action="none"></canvas>
</div>

<div id="chartWrap">
  <div id="chartTitle">GPS speed · Wheel speed (VS_KPH) · delta</div>
  <div id="chartCtrls">
    <button class="btn on" id="btnGPS" onclick="toggleSeries(0)" style="border-color:#3d9eff;color:#3d9eff">GPS</button>
    <button class="btn on" id="btnVSS" onclick="toggleSeries(1)" style="border-color:#f5a623;color:#f5a623">VSS</button>
    <button class="btn on" id="btnDelta" onclick="toggleSeries(2)" style="border-color:#888;color:#888">Δ</button>
  </div>
  <div id="chart" style="width:100%;height:100%"></div>
</div>

<div id="statsRow">
  <div class="stat-cell" style="border-top:2px solid #3d9eff">
    <div class="stat-label">GPS dist</div>
    <div class="stat-val" id="sGpsDist" style="color:#3d9eff">--</div>
  </div>
  <div class="stat-cell" style="border-top:2px solid #f5a623">
    <div class="stat-label">VSS dist</div>
    <div class="stat-val" id="sVssDist" style="color:#f5a623">--</div>
  </div>
  <div class="stat-cell" style="border-top:2px solid #e74c3c">
    <div class="stat-label">Max spin Δ</div>
    <div class="stat-val" id="sMaxSpin" style="color:#e74c3c">--</div>
  </div>
  <div class="stat-cell" style="border-top:2px solid #2ecc71">
    <div class="stat-label">GPS fix</div>
    <div class="stat-val" id="sFixPct" style="color:#2ecc71">--%</div>
  </div>
  <div class="stat-cell" style="border-top:2px solid #a8f">
    <div class="stat-label">Artifacts</div>
    <div class="stat-val" id="sArtifacts" style="color:#a8f">--</div>
  </div>
</div>

<script>
'use strict';
// ── constants ────────────────────────────────────────────────────
const T3_MAX_PTS = 1200, T3_TURN_S = 18, T3_IDLE_MS = 3000;
const MAP_TILES = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
const MAP_ATTR = '&copy; OpenStreetMap contributors &copy; CARTO';

// ── state ────────────────────────────────────────────────────────
let DATA = null;
let _map2d = null, _trackLayer = null, _curMarker = null, _heatLayer = null;
let _t3 = null, _t3raf = null;
let _uplot = null;
let _seriesOn = [true, true, true];
let _showHeat = false, _showSpin = false;
let _spinMarkers = null;
let _stripW = 0;

// ── color ────────────────────────────────────────────────────────
function spd2color(s) {
  if (s < 20)  return '#0055ff';
  if (s < 60)  return 'rgb(0,' + Math.round((s-20)/40*255) + ',' + Math.round(255-(s-20)/40*255) + ')';
  if (s < 120) return 'rgb(' + Math.round((s-60)/60*255) + ',255,0)';
  if (s < 160) return 'rgb(255,' + Math.round(255-(s-120)/40*255) + ',0)';
  return '#ff00ff';
}

// ── ride list ────────────────────────────────────────────────────
async function loadRideList() {
  try {
    const r = await fetch('/rides?t=' + Date.now());
    const d = await r.json();
    const sel = document.getElementById('rideSelect');
    const rides = (d.rides || []).slice().sort((a, b) => (b.opened_utc || '') > (a.opened_utc || '') ? 1 : -1);
    for (const rd of rides) {
      const opt = document.createElement('option');
      opt.value = JSON.stringify({ session: rd.session, ride: rd.ride_num });
      const dt = rd.opened_utc ? new Date(rd.opened_utc).toLocaleString() : '';
      opt.textContent = rd.session + ' · Ride ' + rd.ride_num + (dt ? ' · ' + dt : '');
      sel.appendChild(opt);
    }
  } catch(e) { console.warn('loadRideList', e); }
}

// ── data load ────────────────────────────────────────────────────
async function loadData() {
  const sel = document.getElementById('rideSelect');
  if (!sel.value) { alert('Select a ride first'); return; }
  const { session, ride } = JSON.parse(sel.value);
  document.getElementById('statsBar').textContent = 'Loading...';
  try {
    const r = await fetch('/gps_analysis_data?session=' + session + '&ride=' + ride + '&t=' + Date.now());
    const d = await r.json();
    if (d.error) { document.getElementById('statsBar').textContent = 'Error: ' + d.error; return; }
    DATA = d;
    drawAll();
  } catch(e) {
    document.getElementById('statsBar').textContent = 'Error: ' + e.message;
  }
}

function drawAll() {
  if (!DATA) return;
  draw2D();
  init3D();
  drawQualityStrip();
  buildChart();
  computeStats();
}

// ── 2D Leaflet map ───────────────────────────────────────────────
function draw2D() {
  if (!_map2d) {
    _map2d = L.map('map2d', { attributionControl: false }).setView([32.5, -116.9], 13);
    L.tileLayer(MAP_TILES, { maxZoom: 19, attribution: MAP_ATTR }).addTo(_map2d);
  }
  if (_trackLayer) { _trackLayer.clearLayers(); }
  else { _trackLayer = L.layerGroup().addTo(_map2d); }
  if (_spinMarkers) { _spinMarkers.clearLayers(); } else { _spinMarkers = L.layerGroup().addTo(_map2d); }
  if (_heatLayer) { _map2d.removeLayer(_heatLayer); _heatLayer = null; }

  const pts = DATA.lats.map((lat, i) => [lat, DATA.lons[i]]).filter(p => p[0] != null && Math.abs(p[0]) > 0.001);
  for (let i = 0; i < pts.length - 1; i++) {
    L.polyline([pts[i], pts[i+1]], { color: spd2color(DATA.gps_speed[i] || 0), weight: 3, opacity: 0.85 }).addTo(_trackLayer);
  }
  if (pts.length > 1) {
    L.circleMarker(pts[0], { radius: 6, color: '#00ff88', fillColor: '#00ff88', fillOpacity: 1 }).addTo(_trackLayer).bindPopup('Start');
    L.circleMarker(pts[pts.length-1], { radius: 6, color: '#ff4444', fillColor: '#ff4444', fillOpacity: 1 }).addTo(_trackLayer).bindPopup('End');
    _map2d.fitBounds(pts);
    setTimeout(() => _map2d.invalidateSize(), 50);
  }
}

function toggleHeat() {
  _showHeat = !_showHeat;
  document.getElementById('heatBtn').classList.toggle('on', _showHeat);
  if (!DATA || !_map2d) return;
  if (_heatLayer) { _map2d.removeLayer(_heatLayer); _heatLayer = null; }
  if (!_showHeat) return;
  const hpts = DATA.lats.map((lat, i) => {
    if (lat == null || Math.abs(lat) < 0.001) return null;
    return [lat, DATA.lons[i], Math.min(1, (DATA.gps_speed[i] || 0) / 160)];
  }).filter(Boolean);
  if (window.L.heatLayer) { _heatLayer = L.heatLayer(hpts, { radius: 12, blur: 8, maxZoom: 17 }).addTo(_map2d); }
}

function toggleSpin() {
  _showSpin = !_showSpin;
  document.getElementById('spinBtn').classList.toggle('on', _showSpin);
  if (!DATA || !_spinMarkers) return;
  _spinMarkers.clearLayers();
  if (!_showSpin) return;
  for (let i = 0; i < DATA.times.length; i++) {
    const delta = (DATA.vs_kph[i] || 0) - (DATA.gps_speed[i] || 0);
    const lat = DATA.lats[i]; const lon = DATA.lons[i];
    if (delta > 8 && lat != null && Math.abs(lat) > 0.001) {
      L.circleMarker([lat, lon], { radius: 4, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.8, weight: 1 })
        .addTo(_spinMarkers)
        .bindPopup('Spin Δ=' + delta.toFixed(1) + ' km/h · VSS=' + DATA.vs_kph[i].toFixed(0) + ' GPS=' + DATA.gps_speed[i].toFixed(0));
    }
  }
}

// ── GPS quality strip ─────────────────────────────────────────────
function drawQualityStrip() {
  const canvas = document.getElementById('qualityStrip');
  _stripW = canvas.offsetWidth;
  canvas.width = _stripW;
  canvas.height = 8;
  const ctx = canvas.getContext('2d');
  const dur = DATA.duration_s || 1;
  const n = DATA.times.length;
  for (let i = 0; i < n; i++) {
    const x = Math.round((DATA.times[i] - DATA.times[0]) / dur * _stripW);
    const w = Math.max(1, i < n - 1 ? Math.round((DATA.times[i+1] - DATA.times[0]) / dur * _stripW) - x : 2);
    const v = DATA.valid[i];
    ctx.fillStyle = v === 3 ? '#2ecc71' : v === 2 ? '#f5a623' : '#333';
    ctx.fillRect(x, 0, w, 8);
  }
}

function drawStripCursor(idx) {
  if (!DATA || !_stripW) return;
  const canvas = document.getElementById('qualityStrip');
  drawQualityStrip();
  const ctx = canvas.getContext('2d');
  const x = Math.round((DATA.times[idx] - DATA.times[0]) / DATA.duration_s * _stripW);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillRect(x - 1, 0, 2, 8);
}

// ── uPlot speed chart ─────────────────────────────────────────────
function buildChart() {
  const wrap = document.getElementById('chart');
  if (_uplot) { _uplot.destroy(); _uplot = null; }
  const n = DATA.times.length;
  const delta = DATA.vs_kph.map((v, i) => (v || 0) - (DATA.gps_speed[i] || 0));
  const udata = [
    new Float64Array(DATA.times),
    new Float64Array(DATA.gps_speed.map(v => v == null ? NaN : v)),
    new Float64Array(DATA.vs_kph.map(v => v == null ? NaN : v)),
    new Float64Array(delta),
  ];
  const opts = {
    width: wrap.clientWidth,
    height: wrap.clientHeight - 4,
    cursor: { sync: { key: 'gps_chart' }, drag: { x: true } },
    legend: { show: false },
    scales: {
      x: { time: false },
      y: { range: [0, Math.max(20, ...DATA.gps_speed.filter(Boolean), ...DATA.vs_kph.filter(Boolean)) * 1.05] },
      yd: { range: (u, mn, mx) => [Math.min(-5, mn), Math.max(5, mx)] },
    },
    axes: [
      { stroke: '#55555e', ticks: { stroke: '#1e1e28' }, grid: { stroke: '#1e1e28' }, font: '9px monospace',
        values: (u, vals) => vals.map(v => v == null ? '' : v.toFixed(0) + 's') },
      { scale: 'y', stroke: '#3d9eff', ticks: { stroke: '#1e1e28' }, grid: { stroke: '#1e1e28' },
        font: '9px monospace', values: (u, vals) => vals.map(v => v == null ? '' : v.toFixed(0)) },
      { scale: 'yd', side: 1, stroke: '#888', ticks: { show: false }, grid: { show: false },
        font: '9px monospace', values: (u, vals) => vals.map(v => v == null ? '' : (v > 0 ? '+' : '') + v.toFixed(0)) },
    ],
    series: [
      {},
      { label: 'GPS km/h', scale: 'y', stroke: '#3d9eff', width: 1.5,
        points: { show: false },
        value: (u, v) => v == null ? '--' : v.toFixed(1) + ' km/h' },
      { label: 'VSS km/h', scale: 'y', stroke: '#f5a623', width: 1.5,
        points: { show: false },
        value: (u, v) => v == null ? '--' : v.toFixed(1) + ' km/h' },
      { label: 'Δ (VSS−GPS)', scale: 'yd', stroke: '#888', width: 1, dash: [4, 3],
        points: { show: false },
        value: (u, v) => v == null ? '--' : (v > 0 ? '+' : '') + v.toFixed(1) + ' km/h' },
    ],
    hooks: {
      setCursor: [u => {
        const idx = u.cursor.idx;
        if (idx == null || !DATA) return;
        syncCursorToMaps(idx);
        drawStripCursor(idx);
        updateLegendText(idx, delta);
      }],
      setSize: [u => { /* resize handled by ResizeObserver */ }],
    },
  };
  _uplot = new uPlot(opts, udata, wrap);
}

function updateLegendText(idx, delta) {
  const gspd = DATA.gps_speed[idx] != null ? DATA.gps_speed[idx].toFixed(1) : '--';
  const vspd = DATA.vs_kph[idx] != null ? DATA.vs_kph[idx].toFixed(1) : '--';
  const dv = delta[idx] != null ? ((delta[idx] > 0 ? '+' : '') + delta[idx].toFixed(1)) : '--';
  const t = DATA.times[idx] != null ? DATA.times[idx].toFixed(1) + 's' : '';
  document.getElementById('chartTitle').textContent =
    t + '  GPS ' + gspd + ' · VSS ' + vspd + ' · Δ ' + dv + ' km/h';
}

function toggleSeries(idx) {
  if (!_uplot) return;
  _seriesOn[idx] = !_seriesOn[idx];
  _uplot.setSeries(idx + 1, { show: _seriesOn[idx] });
  const ids = ['btnGPS', 'btnVSS', 'btnDelta'];
  document.getElementById(ids[idx]).classList.toggle('on', _seriesOn[idx]);
}

// ── cursor → map sync ────────────────────────────────────────────
function syncCursorToMaps(idx) {
  const lat = DATA.lats[idx]; const lon = DATA.lons[idx];
  if (lat == null || Math.abs(lat) < 0.001) return;
  if (!_curMarker) {
    _curMarker = L.circleMarker([lat, lon], { radius: 7, color: '#fff', fillColor: '#ffee00', fillOpacity: 0.95, weight: 2 }).addTo(_map2d);
  } else {
    _curMarker.setLatLng([lat, lon]);
  }
  if (_t3) {
    _t3.cursorIdx = Math.round(idx / DATA.times.length * (_t3.pts.length - 1));
  }
}

// ── 3D canvas ───────────────────────────────────────────────────
function init3D() {
  const canvas = document.getElementById('map3d');
  if (!canvas || !DATA || DATA.lats.length < 2) return;
  const lats = DATA.lats, lons = DATA.lons, alts = DATA.alts;
  const lat0 = lats.reduce((s, v) => s + (v || 0), 0) / lats.length;
  const lon0 = lons.reduce((s, v) => s + (v || 0), 0) / lons.length;
  const cosLat = Math.cos(lat0 * Math.PI / 180);
  const validAlts = alts.filter(v => v != null);
  const hasAlt = validAlts.length > lats.length * 0.3;
  const altMin = hasAlt ? Math.min(...validAlts) : 0;
  const stride = Math.max(1, Math.ceil(DATA.times.length / T3_MAX_PTS));
  const pts = [], spd = [];
  for (let i = 0; i < DATA.times.length; i += stride) {
    const lat = lats[i], lon = lons[i];
    if (lat == null || Math.abs(lat) < 0.001) continue;
    pts.push([(lon - lon0) * 111320 * cosLat,
              hasAlt && alts[i] != null ? alts[i] - altMin : 0,
              (lat0 - lat) * 110540]);
    spd.push(DATA.gps_speed[i] || 0);
  }
  let spanX = 0, spanZ = 0, maxY = 0;
  for (const q of pts) { spanX = Math.max(spanX, Math.abs(q[0])); spanZ = Math.max(spanZ, Math.abs(q[2])); maxY = Math.max(maxY, q[1]); }
  const span = Math.max(spanX, spanZ) * 2 || 1;
  const vexag = hasAlt && maxY > 0 ? Math.max(1, span * 0.15 / maxY) : 1;
  const yMid = maxY * vexag / 2;
  let radius = 1;
  for (const q of pts) { q[1] = q[1] * vexag - yMid; radius = Math.max(radius, Math.hypot(q[0], q[1], q[2])); }
  const prev = _t3;
  _t3 = { pts, spd, hasAlt, radius, floorY: -yMid, cursorIdx: null,
           ang: prev ? prev.ang : 0.6, tilt: prev ? prev.tilt : 0.5, zoom: prev ? prev.zoom : 1,
           drag: false, lx: 0, ly: 0, lastTouch: 0, lastTs: 0 };
  if (!canvas._t3bound) { bind3D(canvas); canvas._t3bound = true; }
  if (!_t3raf) _t3raf = requestAnimationFrame(loop3D);
}

function bind3D(canvas) {
  canvas.addEventListener('pointerdown', e => {
    if (!_t3) return;
    _t3.drag = true; _t3.lx = e.clientX; _t3.ly = e.clientY; _t3.lastTouch = performance.now();
    try { canvas.setPointerCapture(e.pointerId); } catch(err) {}
    e.preventDefault();
  });
  canvas.addEventListener('pointermove', e => {
    if (!_t3 || !_t3.drag) return;
    _t3.ang += (e.clientX - _t3.lx) * 0.008;
    _t3.tilt = Math.min(1.45, Math.max(0.05, _t3.tilt + (e.clientY - _t3.ly) * 0.008));
    _t3.lx = e.clientX; _t3.ly = e.clientY; _t3.lastTouch = performance.now();
  });
  const end = () => { if (_t3) { _t3.drag = false; _t3.lastTouch = performance.now(); } };
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointercancel', end);
  canvas.addEventListener('wheel', e => {
    if (!_t3) return;
    e.preventDefault();
    _t3.zoom = Math.min(4, Math.max(0.3, _t3.zoom * (e.deltaY < 0 ? 1.1 : 0.91)));
    _t3.lastTouch = performance.now();
  }, { passive: false });
}

function loop3D(ts) {
  _t3raf = requestAnimationFrame(loop3D);
  if (!_t3 || document.hidden) return;
  const canvas = document.getElementById('map3d');
  if (!canvas) return;
  const dt = _t3.lastTs ? Math.min(0.1, (ts - _t3.lastTs) / 1000) : 0;
  _t3.lastTs = ts;
  if (!_t3.drag && ts - _t3.lastTouch > T3_IDLE_MS) {
    _t3.ang += (2 * Math.PI / T3_TURN_S) * dt;
  }
  draw3D(canvas);
}

function draw3D(canvas) {
  const rect = canvas.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) return;
  if (canvas.width !== Math.round(rect.width))  canvas.width  = Math.round(rect.width);
  if (canvas.height !== Math.round(rect.height)) canvas.height = Math.round(rect.height);
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a0b'; ctx.fillRect(0, 0, W, H);
  const cy = Math.cos(_t3.ang), sy = Math.sin(_t3.ang);
  const cp = Math.cos(_t3.tilt), sp = Math.sin(_t3.tilt);
  const s = ((Math.min(W, H) / 2 - 20) / _t3.radius) * _t3.zoom;
  const P = q => {
    const x1 = q[0] * cy + q[2] * sy, z1 = -q[0] * sy + q[2] * cy;
    return [W / 2 + x1 * s, H / 2 - (q[1] * cp - z1 * sp) * s];
  };
  // Floor shadow
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1.5; ctx.beginPath();
  for (let i = 0; i < _t3.pts.length; i++) {
    const v = P([_t3.pts[i][0], _t3.floorY, _t3.pts[i][2]]);
    i === 0 ? ctx.moveTo(v[0], v[1]) : ctx.lineTo(v[0], v[1]);
  }
  ctx.stroke();
  // Track colored by speed
  ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  for (let i = 0; i < _t3.pts.length - 1; i++) {
    const va = P(_t3.pts[i]), vb = P(_t3.pts[i+1]);
    ctx.strokeStyle = spd2color(_t3.spd[i]);
    ctx.beginPath(); ctx.moveTo(va[0], va[1]); ctx.lineTo(vb[0], vb[1]); ctx.stroke();
  }
  // Start / end dots
  const v0 = P(_t3.pts[0]), v1 = P(_t3.pts[_t3.pts.length-1]);
  ctx.fillStyle = '#00ff88'; ctx.beginPath(); ctx.arc(v0[0], v0[1], 5, 0, 7); ctx.fill();
  ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(v1[0], v1[1], 5, 0, 7); ctx.fill();
  // Cursor highlight
  if (_t3.cursorIdx != null) {
    const vc = P(_t3.pts[_t3.cursorIdx]);
    ctx.fillStyle = '#ffee00'; ctx.beginPath(); ctx.arc(vc[0], vc[1], 6, 0, 7); ctx.fill();
  }
  if (!_t3.hasAlt) {
    ctx.fillStyle = '#444'; ctx.font = '9px monospace'; ctx.fillText('flat — no altitude data', 8, 14);
  }
}

// ── stats ────────────────────────────────────────────────────────
function computeStats() {
  if (!DATA) return;
  let gpsDist = 0, vssDist = 0, maxSpin = 0, fixCount = 0, artifactCount = 0;
  for (let i = 0; i < DATA.times.length; i++) {
    const gspd = DATA.gps_speed[i] || 0;
    const vspd = DATA.vs_kph[i] || 0;
    const delta = vspd - gspd;
    if (delta > 8) maxSpin = Math.max(maxSpin, delta);
    if (delta < -12 && DATA.valid[i] > 0) artifactCount++;
    if (DATA.valid[i] > 0) fixCount++;
    if (i > 0) {
      const dt = DATA.times[i] - DATA.times[i-1];
      vssDist += (vspd / 3600) * dt;
      if (DATA.lats[i] != null && DATA.lats[i-1] != null && Math.abs(DATA.lats[i]) > 0.001) {
        const dLat = (DATA.lats[i] - DATA.lats[i-1]) * 110.54;
        const dLon = (DATA.lons[i] - DATA.lons[i-1]) * 111.32 * Math.cos(DATA.lats[i] * Math.PI / 180);
        gpsDist += Math.sqrt(dLat * dLat + dLon * dLon);
      }
    }
  }
  const fixPct = Math.round(100 * fixCount / DATA.times.length);
  document.getElementById('sGpsDist').textContent = gpsDist.toFixed(2) + ' km';
  document.getElementById('sVssDist').textContent = vssDist.toFixed(2) + ' km';
  document.getElementById('sMaxSpin').textContent = maxSpin > 0 ? '+' + maxSpin.toFixed(1) + ' km/h' : '0';
  document.getElementById('sFixPct').textContent = fixPct + '%';
  document.getElementById('sArtifacts').textContent = artifactCount;
  document.getElementById('statsBar').textContent =
    DATA.count + ' rows · ' + (DATA.duration_s || 0).toFixed(0) + 's · GPS ' + gpsDist.toFixed(2) +
    'km · VSS ' + vssDist.toFixed(2) + 'km · max spin Δ' + (maxSpin > 0 ? '+' + maxSpin.toFixed(1) : '0') + ' km/h';
}

// ── resize ───────────────────────────────────────────────────────
const ro = new ResizeObserver(() => {
  if (_map2d) _map2d.invalidateSize();
  if (_uplot) {
    const wrap = document.getElementById('chart');
    _uplot.setSize({ width: wrap.clientWidth, height: wrap.clientHeight - 4 });
  }
  if (DATA) drawQualityStrip();
});
ro.observe(document.getElementById('map2d'));
ro.observe(document.getElementById('chart'));

// ── init ─────────────────────────────────────────────────────────
loadRideList();
</script>
