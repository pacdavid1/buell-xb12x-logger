<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sessions VS — Buell Logger</title>
<style>
:root{--bg:#0a0a0b;--p:#111114;--bd:#1e1e24;--ac:#e8420a;--a2:#f5a623;--bl:#3d9eff;--gn:#33ff99;--dm:#555;--tx:#c8c8cc;--rd:#ff4444;--mn:monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:sans-serif;font-size:13px;min-height:100dvh;display:flex;flex-direction:column}
.hd{background:var(--p);border-bottom:2px solid var(--ac);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hd h1{font-size:16px;font-weight:900;color:#fff;font-family:var(--mn)}
.hd-links{display:flex;gap:6px}
.hd a{font-family:var(--mn);font-size:9px;color:var(--dm);text-decoration:none;border:1px solid var(--bd);padding:3px 6px;border-radius:2px}
.hd a:hover{color:var(--bl);border-color:var(--bl)}
.w{flex:1;padding:6px;display:flex;flex-direction:column;gap:6px;overflow:hidden;min-height:0}
.sel{background:var(--p);border:1px solid var(--bd);padding:8px;border-radius:4px;flex-shrink:0}
.sel-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.sg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px}
.sg label{font-family:var(--mn);font-size:8px;color:var(--a2);text-transform:uppercase;letter-spacing:.08em}
.sg select{background:var(--bg);border:1px solid var(--bd);color:#fff;font-family:var(--mn);font-size:11px;padding:5px;border-radius:2px;width:100%}
.bike-tag{font-family:var(--mn);font-size:8px;padding:2px 6px;border-radius:2px;border:1px solid var(--bd);color:var(--dm)}
.bike-same{border-color:var(--gn);color:var(--gn)}
.bike-diff{border-color:var(--rd);color:var(--rd)}
.btn{font-family:var(--mn);font-size:9px;font-weight:700;background:var(--ac);color:#fff;border:none;padding:6px 14px;border-radius:2px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.btn:hover{filter:brightness(1.2)}
.btn:disabled{opacity:0.4;cursor:default}
#st{font-family:var(--mn);font-size:9px;color:var(--dm);margin-top:4px}
.fsum{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.fc{background:var(--p);border:1px solid var(--bd);border-radius:3px;padding:5px 8px;font-family:var(--mn);font-size:8px;flex:1;min-width:100px}
.fc .fl{color:var(--a2);font-weight:700;margin-bottom:3px;letter-spacing:.06em}
.fc .fv{display:flex;justify-content:space-between;color:var(--tx)}
.fc .fv span:last-child{color:var(--dm)}
.ftabs{display:flex;gap:0;background:var(--p);border:1px solid var(--bd);border-radius:4px;overflow:hidden;flex-shrink:0}
.ftab{flex:1;padding:5px 2px;font-family:var(--mn);font-size:8px;font-weight:700;color:var(--dm);background:transparent;border:none;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;border-right:1px solid var(--bd)}
.ftab:last-child{border-right:none}
.ftab.on{background:var(--ac);color:#fff}
.dt-wrap{flex:1;overflow:auto;min-height:0}
table.dt{border-collapse:collapse;font-family:var(--mn);font-size:9px;width:100%;white-space:nowrap}
table.dt thead tr{background:var(--p);position:sticky;top:0;z-index:1}
table.dt th{padding:4px 6px;text-align:right;font-size:7px;color:var(--dm);font-weight:700;letter-spacing:.06em;border-bottom:1px solid var(--bd)}
table.dt th:first-child{text-align:left}
table.dt td{padding:3px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03)}
table.dt td:first-child{text-align:left;color:var(--a2)}
table.dt td:nth-child(2){color:var(--tx)}
table.dt tr:hover td{background:rgba(255,255,255,.03)}
.pos{color:#ff6060}.neg{color:#60b0ff}.neu{color:var(--dm)}
.bar-wrap{height:8px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:1px;position:absolute}
.bar-pos{background:rgba(255,80,80,.7);right:50%}
.bar-neg{background:rgba(80,150,255,.7);left:50%}
.n-badge{font-size:7px;color:var(--dm);font-family:var(--mn)}
.no-data{padding:24px;text-align:center;color:var(--dm);font-family:var(--mn);font-size:10px}
</style></head><body>
<div class="hd">
  <h1>BUELL LOGGER</h1>
  <div class="hd-links">
    <a href="/">Dashboard</a>
    <a href="/sessions_vs" style="color:var(--ac);border-color:var(--ac)">Sessions VS</a>
    <a href="/tuner">Tuner Studio</a>
  </div>
</div>
<div class="w">
  <div class="sel">
    <div class="sel-row">
      <div class="sg">
        <label>Sesión A (base)</label>
        <select id="sA"><option value="">-- seleccionar --</option></select>
      </div>
      <div class="sg">
        <label>Sesión B (mod)</label>
        <select id="sB"><option value="">-- seleccionar --</option></select>
      </div>
      <span class="bike-tag" id="bikeTag">—</span>
      <button class="btn" id="btnCmp" onclick="compare()" disabled>COMPARAR</button>
      <button class="btn" id="btnDl" onclick="download()" disabled style="background:var(--bl)">JSON</button>
    </div>
    <div id="st">Cargando sesiones...</div>
  </div>
  <div class="fsum" id="fsum" style="display:none">
    <div class="fc" id="fcA"></div>
    <div class="fc" id="fcB"></div>
  </div>
  <div class="ftabs" id="ftabs" style="display:none">
    <button class="ftab on" data-mode="SPORT" onclick="setMode(this)">&#9889; SPORT</button>
    <button class="ftab" data-mode="ECO" onclick="setMode(this)">&#9680; ECO</button>
    <button class="ftab" data-mode="ALL" onclick="setMode(this)">ALL</button>
    <span style="flex:1"></span>
    <button class="ftab" data-f="SWEET" id="fSWEET" onclick="showFlavor(this)" style="display:none">SWEET</button>
    <button class="ftab" data-f="SALTY_UP" id="fSALTY_UP" onclick="showFlavor(this)" style="display:none">SALTY UP</button>
    <button class="ftab" data-f="SALTY_DOWN" id="fSALTY_DOWN" onclick="showFlavor(this)" style="display:none">SALTY DWN</button>
    <button class="ftab" data-f="SPICY_WOT" id="fSPICY_WOT" onclick="showFlavor(this)" style="display:none">WOT</button>
    <button class="ftab" data-f="SPICY_TIPIN" id="fSPICY_TIPIN" onclick="showFlavor(this)" style="display:none">TIP-IN</button>
  </div>
  <div id="modeSum" style="display:none;font-family:var(--mn);font-size:9px;padding:4px 8px;background:var(--p);border:1px solid var(--bd);border-radius:3px;flex-shrink:0"></div>
  <div class="dt-wrap" id="dtWrap" style="display:none">
    <div class="no-data" id="noData" style="display:none">Sin celdas comunes para este flavor</div>
    <table class="dt" id="dtTable">
      <thead>
        <tr>
          <th colspan="2" style="color:#888;text-align:center">CONTEXTO</th>
          <th colspan="2" style="color:#888;text-align:center;border-right:1px solid var(--bd)">SAMPLES</th>
          <th colspan="3" style="color:#f5a623;text-align:center;border-right:1px solid var(--bd)">FUEL FR</th>
          <th colspan="3" style="color:#e8720a;text-align:center;border-right:1px solid var(--bd)">FUEL RR</th>
          <th colspan="3" style="color:#3d9eff;text-align:center;border-right:1px solid var(--bd)">SPARK FR</th>
          <th colspan="3" style="color:#60c0ff;text-align:center;border-right:1px solid var(--bd)">SPARK RR</th>
          <th colspan="3" style="color:#33ff99;text-align:center;border-right:1px solid var(--bd)">ACCEL</th>
          <th colspan="3" style="color:#ff9944;text-align:center;border-right:1px solid var(--bd)">VSS</th>
          <th colspan="3" style="color:#ff4444;text-align:center">TEMP</th>
        </tr>
        <tr>
          <th>RPM</th><th>TPS%</th>
          <th>#A</th><th style="border-right:1px solid var(--bd)">#B</th>
          <th>A</th><th>B</th><th style="border-right:1px solid var(--bd)">dPW1</th>
          <th>A</th><th>B</th><th style="border-right:1px solid var(--bd)">dPW2</th>
          <th>A</th><th>B</th><th style="border-right:1px solid var(--bd)">dSPK1</th>
          <th>A</th><th>B</th><th style="border-right:1px solid var(--bd)">dSPK2</th>
          <th>A</th><th>B</th><th style="border-right:1px solid var(--bd)">dACC</th>
          <th>A</th><th>B</th><th style="border-right:1px solid var(--bd)">dVSS</th>
          <th>CLT_A</th><th>CLT_B</th><th>dCLT</th>
        </tr>
      </thead>
      <tbody id="dtBody"></tbody>
    </table>
  </div>
</div>
<script>
var _data=null,_curFlavor='SWEET',_curMode='SPORT',MIN_N=10;

async function init(){
  try{
    var r=await fetch('/tuner/sessions');
    var d=await r.json();
    if(!d.sessions||!d.sessions.length){st('No hay sesiones');return}
    var o='<option value="">-- seleccionar --</option>';
    for(var i=0;i<d.sessions.length;i++){
      var s=d.sessions[i];
      var bike=s.serial?' #'+s.serial:'';
      o+='<option value="'+s.id+'">'+s.id+bike+' — '+s.created+' ('+s.rides+'r)</option>';
    }
    document.getElementById('sA').innerHTML=o;
    document.getElementById('sB').innerHTML=o;
    st(d.sessions.length+' sesiones disponibles');
  }catch(e){st('Error: '+e.message)}
}

function st(t){document.getElementById('st').textContent=t}

function onSelect(){
  var a=document.getElementById('sA').value;
  var b=document.getElementById('sB').value;
  document.getElementById('btnCmp').disabled=!(a&&b&&a!==b);
  document.getElementById('bikeTag').className='bike-tag';
  document.getElementById('bikeTag').textContent='—';
}

async function compare(){
  var a=document.getElementById('sA').value;
  var b=document.getElementById('sB').value;
  if(!a||!b)return;
  st('Comparando...');
  document.getElementById('btnCmp').disabled=true;
  document.getElementById('fsum').style.display='none';
  document.getElementById('ftabs').style.display='none';
  document.getElementById('dtWrap').style.display='none';
  try{
    var r=await fetch('/sessions_vs/compare?a='+a+'&b='+b);
    _data=await r.json();
    if(_data.error){st('Error: '+_data.error);document.getElementById('btnCmp').disabled=false;return}
    render();
  }catch(e){st('Error: '+e.message)}
  document.getElementById('btnCmp').disabled=false;
}

function flavorColor(f){
  return{SWEET:'#33ff99',SALTY_UP:'#f5a623',SALTY_DOWN:'#3d9eff',
    SPICY_WOT:'#ff4444',SPICY_TIPIN:'#ff9944',SPICY_TIPOUT:'#ff6699',BITTER:'#444'}[f]||'#888';
}

function renderFlavors(id,meta){
  var el=document.getElementById(id);
  var f=meta.flavors||{};
  var total=Object.values(f).reduce(function(a,b){return a+b},0)||1;
  var order=['SWEET','SALTY_UP','SALTY_DOWN','SPICY_WOT','SPICY_TIPIN','SPICY_TIPOUT','BITTER'];
  var html='<div style="font-family:var(--mn);font-size:8px;color:var(--a2);font-weight:700;margin-bottom:3px">'
    +meta.id+' <span style="color:var(--dm);font-weight:400">'+meta.version
    +' · '+meta.created+' · '+meta.rides+'r · '+meta.samples.toLocaleString()+'</span></div>';
  // barra apilada
  html+='<div style="display:flex;height:6px;border-radius:2px;overflow:hidden;margin-bottom:4px">';
  for(var i=0;i<order.length;i++){
    var k=order[i],v=f[k]||0;
    if(!v)continue;
    var pct=v/total*100;
    html+='<div title="'+k+': '+v.toLocaleString()+' ('+Math.round(pct)+'%)" style="width:'+pct+'%;background:'+flavorColor(k)+';"></div>';
  }
  html+='</div>';
  // leyenda inline
  html+='<div style="display:flex;flex-wrap:wrap;gap:4px 8px;">';
  for(var i=0;i<order.length;i++){
    var k=order[i],v=f[k]||0;
    if(!v)continue;
    var pct=Math.round(v/total*100);
    html+='<span style="font-family:var(--mn);font-size:7px;white-space:nowrap">'
      +'<span style="color:'+flavorColor(k)+'">&#9632;</span> '
      +'<span style="color:var(--tx)">'+k+'</span> '
      +'<span style="color:var(--dm)">'+v.toLocaleString()+' ('+pct+'%)</span></span>';
  }
  html+='</div>';
  el.innerHTML=html;
}

function render(){
  if(!_data)return;
  var tag=document.getElementById('bikeTag');
  var sa=_data.bike_serial_a?'#'+_data.bike_serial_a:'?';
  var sb=_data.bike_serial_b?'#'+_data.bike_serial_b:'?';
  if(_data.same_bike){
    tag.className='bike-tag bike-same';
    tag.textContent='MISMA MOTO '+sa+' ✓';
  }else{
    tag.className='bike-tag bike-diff';
    tag.textContent='MOTOS DISTINTAS '+sa+' vs '+sb+' ⚠';
  }
  renderFlavors('fcA',_data.sa);
  renderFlavors('fcB',_data.sb);
  document.getElementById('fsum').style.display='flex';
  document.getElementById('ftabs').style.display='flex';
  document.getElementById('dtWrap').style.display='block';
  document.getElementById('btnDl').disabled=false;
  var msg=_data.common+' celdas comunes';
  if(_data._ms) msg+=' ('+_data._ms+'ms)';
  st(msg);
  renderMode();
}

function setMode(btn){
  document.querySelectorAll('.ftab[data-mode]').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  _curMode=btn.dataset.mode;
  var allF=document.querySelectorAll('.ftab[data-f]');
  allF.forEach(function(b){b.style.display=_curMode==='ALL'?'':'none'});
  document.getElementById('modeSum').style.display=_curMode==='ALL'?'none':'block';
  if(_curMode==='ALL'){renderTable(_curFlavor);}else{renderMode();}
}
function showFlavor(btn){
  document.querySelectorAll('.ftab[data-f]').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  _curFlavor=btn.dataset.f;
  renderTable(_curFlavor);
}
function renderMode(){
  if(!_data)return;
  var rows;
  if(_curMode==='SPORT'){
    rows=_data.delta.filter(function(r){return(r.flavor==='SPICY_WOT'||r.flavor==='SPICY_TIPIN')&&r.na>=MIN_N&&r.nb>=MIN_N});
    rows.sort(function(a,b){return Math.abs(b.ddvss)-Math.abs(a.ddvss)});
  }else{
    rows=_data.delta.filter(function(r){return(r.flavor==='SWEET'||r.flavor==='SALTY_UP'||r.flavor==='SALTY_DOWN')&&r.na>=MIN_N&&r.nb>=MIN_N&&Math.abs(r.ddvss)<0.5});
    rows.sort(function(a,b){return a.dpw_eff-b.dpw_eff});
  }
  var sumEl=document.getElementById('modeSum');
  if(_curMode==='SPORT'){
    var aW=rows.filter(function(r){return r.ddvss<0}).length;
    var bW=rows.filter(function(r){return r.ddvss>0}).length;
    var avg=rows.length?rows.reduce(function(s,r){return s+r.ddvss},0)/rows.length:0;
    sumEl.innerHTML='<span style="color:var(--a2)">SPORT</span> — '
      +'Mapa A gana <span style="color:#33ff99">'+aW+'/'+rows.length+'</span> | '
      +'Mapa B gana <span style="color:#ff6060">'+bW+'/'+rows.length+'</span> | '
      +'dACC prom: <span style="color:var(--bl)">'+(avg>=0?'+':'')+avg.toFixed(3)+' km/h/s</span>';
  }else{
    var pwAvg=function(r){return(r.dpw1+r.dpw2)/2};
    var aW=rows.filter(function(r){return pwAvg(r)<0}).length;
    var bW=rows.filter(function(r){return pwAvg(r)>0}).length;
    var avg=rows.length?rows.reduce(function(s,r){return s+pwAvg(r)},0)/rows.length:0;
    sumEl.innerHTML='<span style="color:var(--a2)">ECO</span> — '
      +'Mapa A gana <span style="color:#33ff99">'+aW+'/'+rows.length+'</span> | '
      +'Mapa B gana <span style="color:#ff6060">'+bW+'/'+rows.length+'</span> | '
      +'dPW prom: <span style="color:var(--bl)">'+(avg>=0?'+':'')+avg.toFixed(3)+' ms</span>';
  }
  renderTableRows(rows);
}

function renderTable(flavor){
  if(!_data)return;
  var rows=_data.delta.filter(function(r){return r.flavor===flavor&&r.flavor!=='SPICY_TIPOUT'});
  renderTableRows(rows);
}
function renderTableRows(rows){
  var tbody=document.getElementById('dtBody');
  var noData=document.getElementById('noData');
  var table=document.getElementById('dtTable');
  if(!rows.length){noData.style.display='block';table.style.display='none';return}
  noData.style.display='none';
  table.style.display='table';
  var html='';
  for(var i=0;i<rows.length;i++){
    var r=rows[i];


    var cltBias=Math.abs(r.dclt||0)>5;
    html+='<tr'+(cltBias?' style="background:rgba(245,166,35,0.07)"':'')+'>'      +'<td>'+(cltBias?'<span title="dCLT='+r.dclt+'°" style="color:var(--a2)">⚠ </span>':'')+r.rpm+'</td>'
      +'<td>'+r.tps+'%</td>'
      +'<td class="n-badge">'+r.na+'</td>'
      +'<td class="n-badge" style="border-right:1px solid var(--bd)">'+r.nb+'</td>'
      +'<td style="color:#f5a623">'+r.pw1_a.toFixed(2)+'</td>'
      +'<td style="color:#f5a623">'+r.pw1_b.toFixed(2)+'</td>'
      +'<td class="'+(r.dpw1>0.1?'pos':r.dpw1<-0.1?'neg':'neu')+'" style="border-right:1px solid var(--bd)">'+(r.dpw1>=0?'+':'')+r.dpw1.toFixed(3)+'</td>'
      +'<td style="color:#e8720a">'+r.pw2_a.toFixed(2)+'</td>'
      +'<td style="color:#e8720a">'+r.pw2_b.toFixed(2)+'</td>'
      +'<td class="'+(r.dpw2>0.1?'pos':r.dpw2<-0.1?'neg':'neu')+'" style="border-right:1px solid var(--bd)">'+(r.dpw2>=0?'+':'')+r.dpw2.toFixed(3)+'</td>'
      +'<td style="color:#3d9eff">'+r.spk1_a.toFixed(1)+'</td>'
      +'<td style="color:#3d9eff">'+r.spk1_b.toFixed(1)+'</td>'
      +'<td class="'+(r.dspk1>0.5?'pos':r.dspk1<-0.5?'neg':'neu')+'" style="border-right:1px solid var(--bd)">'+(r.dspk1>=0?'+':'')+r.dspk1.toFixed(2)+'</td>'
      +'<td style="color:#60c0ff">'+r.spk2_a.toFixed(1)+'</td>'
      +'<td style="color:#60c0ff">'+r.spk2_b.toFixed(1)+'</td>'
      +'<td class="'+(r.dspk2>0.5?'pos':r.dspk2<-0.5?'neg':'neu')+'" style="border-right:1px solid var(--bd)">'+(r.dspk2>=0?'+':'')+r.dspk2.toFixed(2)+'</td>'
      +'<td style="color:#33ff99">'+r.dvss_a.toFixed(3)+'</td>'
      +'<td style="color:#33ff99">'+r.dvss_b.toFixed(3)+'</td>'
      +'<td class="'+(r.ddvss>0.05?'pos':r.ddvss<-0.05?'neg':'neu')+'" style="border-right:1px solid var(--bd)">'+(r.ddvss>=0?'+':'')+r.ddvss.toFixed(3)+'</td>'
      +'<td style="color:#ff9944">'+(r.spd_a!=null?r.spd_a.toFixed(1):'—')+'</td>'
      +'<td style="color:#ff9944">'+(r.spd_b!=null?r.spd_b.toFixed(1):'—')+'</td>'
      +'<td class="'+(r.dspd!=null&&r.dspd>0.5?'pos':r.dspd!=null&&r.dspd<-0.5?'neg':'neu')+'" style="border-right:1px solid var(--bd)">'+(r.dspd!=null?(r.dspd>=0?'+':'')+r.dspd.toFixed(1):'—')+'</td>'
      +'<td style="color:#ff4444">'+r.clt_a.toFixed(0)+'</td>'
      +'<td style="color:#ff4444">'+r.clt_b.toFixed(0)+'</td>'
      +'<td class="'+(cltBias?'pos':'neu')+'">'+(r.dclt>=0?'+':'')+r.dclt.toFixed(1)+'</td>'
      +'</tr>';
  }
  tbody.innerHTML=html;
}

function download(){
  if(!_data)return;
  var blob=new Blob([JSON.stringify(_data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='sessions_vs_'+_data.sa.id+'_'+_data.sb.id+'.json';
  a.click();
}
document.getElementById('sA').onchange=onSelect;
document.getElementById('sB').onchange=onSelect;
init();
</script>
</body></html>
