<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Session Events — Buell Logger</title>
<style>
:root{--bg:#0a0a0b;--p:#111114;--bd:#1e1e24;--ac:#e8420a;--a2:#f5a623;--bl:#3d9eff;--gn:#2cdd6e;--dm:#55555e;--tx:#c8c8cc;--rd:#ff4444;--mn:'Share Tech Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:14px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

.hdr{background:var(--p);border-bottom:2px solid var(--ac);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr-title{font-size:13px;font-weight:900;color:#fff;font-family:var(--mn);letter-spacing:.04em}
.hdr-nav{display:flex;gap:6px}
.hdr-nav a{font-family:var(--mn);font-size:9px;color:var(--dm);text-decoration:none;border:1px solid var(--bd);padding:3px 8px;border-radius:2px}
.hdr-nav a:hover{color:var(--bl);border-color:var(--bl)}
.hdr-nav a.active{color:var(--ac);border-color:var(--ac)}

.controls{background:var(--p);border-bottom:1px solid var(--bd);padding:6px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;flex-wrap:wrap}
.ctrl-group{display:flex;flex-direction:column;gap:2px}
.ctrl-group label{font-family:var(--mn);font-size:7px;color:var(--a2);letter-spacing:.12em;text-transform:uppercase}
.ctrl-group select{background:var(--bg);border:1px solid var(--bd);color:#fff;font-family:var(--mn);font-size:10px;padding:4px 8px;border-radius:2px;cursor:pointer;min-width:120px}
.btn{font-family:var(--mn);font-size:10px;font-weight:700;background:var(--ac);color:#fff;border:none;padding:6px 14px;border-radius:2px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
.btn:hover{filter:brightness(1.15)}
.btn:disabled{opacity:.4;cursor:default}
.status{font-family:var(--mn);font-size:9px;color:var(--dm);align-self:center;margin-left:auto}
.status.err{color:var(--rd)}.status.ok{color:var(--gn)}.status.loading{color:var(--a2)}

.content{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:0}

.summary-bar{display:flex;gap:6px;flex-shrink:0}
.sum-chip{background:var(--p);border:1px solid var(--bd);border-radius:2px;padding:4px 10px;font-family:var(--mn);font-size:9px;display:flex;gap:6px;align-items:center}
.sum-chip .lbl{color:var(--dm);font-size:7px;text-transform:uppercase;letter-spacing:.1em}
.sum-chip .val{color:var(--tx);font-weight:700}

.cluster-grid{display:flex;flex-direction:column;gap:5px}

.cluster-card{background:var(--p);border:1px solid var(--bd);border-radius:3px;overflow:hidden;transition:border-color .12s}
.cluster-card:hover{border-color:rgba(255,255,255,.12)}
.cluster-card.orphan{opacity:.6}
.cluster-card.ba-ok{border-left:3px solid var(--gn)}
.cluster-card.ba-mixed{border-left:3px solid var(--a2)}

.card-header{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;user-select:none;min-height:32px;flex-wrap:wrap}
.card-header:hover{background:rgba(255,255,255,.025)}

.cid{font-family:var(--mn);font-size:8px;color:var(--dm);flex-shrink:0;min-width:32px}
.n-badge{font-family:var(--mn);font-size:10px;font-weight:900;padding:2px 6px;border-radius:2px;flex-shrink:0}
.n-high{background:rgba(44,221,110,.15);color:var(--gn);border:1px solid rgba(44,221,110,.3)}
.n-med{background:rgba(245,166,35,.12);color:var(--a2);border:1px solid rgba(245,166,35,.25)}
.n-low{background:rgba(85,85,94,.2);color:var(--dm);border:1px solid var(--bd)}

.bucket-badge{font-family:var(--mn);font-size:9px;color:var(--tx);background:rgba(255,255,255,.04);border:1px solid var(--bd);padding:2px 6px;border-radius:2px;flex-shrink:0}
.bucket-badge span{color:var(--a2);margin-right:2px}

.context-badges{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.cbadge{font-family:var(--mn);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;white-space:nowrap}
.cbadge.warn{color:var(--a2);border-color:rgba(245,166,35,.35);background:rgba(245,166,35,.07)}
.cbadge.info{color:var(--dm);border-color:var(--bd);background:transparent}
.cbadge.alert{color:var(--rd);border-color:rgba(255,68,68,.35);background:rgba(255,68,68,.07)}

.dtw-range{font-family:var(--mn);font-size:8px;color:var(--dm);flex-shrink:0;white-space:nowrap}
.toggle-btn{font-family:var(--mn);font-size:9px;color:var(--dm);background:transparent;border:none;cursor:pointer;padding:2px 4px;flex-shrink:0}

.card-body{display:none;border-top:1px solid var(--bd);padding:6px 8px;display:none;gap:8px;flex-direction:column}
.card-body.open{display:flex}

.chart-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.chart-wrap{flex:1;min-width:200px;display:flex;flex-direction:column;gap:3px}
.chart-label{font-family:var(--mn);font-size:7px;color:var(--dm);letter-spacing:.1em;text-transform:uppercase}
.chart-canvas-wrap{position:relative;height:80px;width:100%}
.chart-canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}

.members-table{width:100%;border-collapse:collapse;font-family:var(--mn);font-size:8px}
.members-table th{text-align:left;color:var(--dm);font-size:7px;letter-spacing:.08em;padding:2px 4px;border-bottom:1px solid var(--bd)}
.members-table td{padding:2px 4px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--tx)}
.members-table td:first-child{color:var(--a2)}
.members-table tr:hover td{background:rgba(255,255,255,.02)}

.no-data{flex:1;display:flex;align-items:center;justify-content:center;font-family:var(--mn);font-size:11px;color:var(--dm);flex-direction:column;gap:8px}
.no-data span{font-size:24px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">BUELL LOGGER — SESSION EVENTS</div>
  <div class="hdr-nav">
    <a href="/">Dashboard</a>
    <a href="/sessions_vs">VS</a>
    <a href="/sessions_launch">Launch</a>
    <a href="/session_events" class="active">Events</a>
  </div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Session</label>
    <select id="selSession"></select>
  </div>
  <div class="ctrl-group">
    <label>DTW Threshold</label>
    <select id="selThresh">
      <option value="0.80">0.80 — loose</option>
      <option value="0.85" selected>0.85 — default</option>
      <option value="0.90">0.90 — strict</option>
      <option value="0.95">0.95 — very strict</option>
    </select>
  </div>
  <button class="btn" id="btnLoad" onclick="loadSession()">LOAD</button>
  <div class="status" id="status">Select a session</div>
</div>

<div class="content" id="content">
  <div class="no-data"><span>⚡</span>Select a session and press LOAD</div>
</div>

<script>
var DATA = null;

// ── Session list ─────────────────────────────────────────────────────────────
fetch('/rides')
  .then(r => r.json())
  .then(sessions => {
    var sel = document.getElementById('selSession');
    sessions.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s.id || s.checksum || s;
      opt.textContent = (s.id || s.checksum || s) +
        (s.version ? '  [' + s.version + ']' : '') +
        (s.rides   ? '  ' + s.rides + 'r' : '');
      sel.appendChild(opt);
    });
  })
  .catch(function() {
    document.getElementById('status').textContent = 'Could not load sessions';
    document.getElementById('status').className = 'status err';
  });

// ── Load session clusters ─────────────────────────────────────────────────────
function loadSession() {
  var sid    = document.getElementById('selSession').value;
  var thresh = document.getElementById('selThresh').value;
  if (!sid) return;

  var btn = document.getElementById('btnLoad');
  var st  = document.getElementById('status');
  btn.disabled = true;
  st.className = 'status loading';
  st.textContent = 'Processing…';
  document.getElementById('content').innerHTML = '<div class="no-data"><span>⏳</span>Detecting events and clustering…</div>';

  fetch('/session_events/data?session=' + sid + '&threshold=' + thresh)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      btn.disabled = false;
      if (d.error) {
        st.className = 'status err';
        st.textContent = 'Error: ' + d.error;
        return;
      }
      DATA = d;
      st.className = 'status ok';
      st.textContent = d.n_rides + 'r · ' + d.n_events + ' events · ' + d.n_clusters + ' clusters';
      render(d);
    })
    .catch(function(e) {
      btn.disabled = false;
      st.className = 'status err';
      st.textContent = 'Request failed';
    });
}

// ── Render clusters ───────────────────────────────────────────────────────────
function render(d) {
  var content = document.getElementById('content');
  if (!d.clusters || d.clusters.length === 0) {
    content.innerHTML = '<div class="no-data"><span>🔍</span>No events detected in this session</div>';
    return;
  }

  var html = '<div class="summary-bar">';
  html += sumChip('RIDES', d.n_rides);
  html += sumChip('EVENTS', d.n_events);
  html += sumChip('CLUSTERS', d.clusters.filter(function(c){ return !c.orphan; }).length);
  html += sumChip('ORPHANS', d.clusters.filter(function(c){ return c.orphan; }).length);
  html += sumChip('THRESHOLD', d.threshold);
  html += '</div>';

  html += '<div class="cluster-grid" id="clusterGrid"></div>';
  content.innerHTML = html;

  var grid = document.getElementById('clusterGrid');
  d.clusters.forEach(function(c, ci) {
    grid.appendChild(buildCard(c, ci));
  });
}

function sumChip(lbl, val) {
  return '<div class="sum-chip"><div class="lbl">' + lbl + '</div><div class="val">' + val + '</div></div>';
}

// ── Build cluster card ────────────────────────────────────────────────────────
function buildCard(c, ci) {
  var div = document.createElement('div');
  var baClass = c.bucket_a_ok ? 'ba-ok' : 'ba-mixed';
  div.className = 'cluster-card ' + baClass + (c.orphan ? ' orphan' : '');

  var nClass = c.n >= 5 ? 'n-high' : c.n >= 2 ? 'n-med' : 'n-low';
  var ba = c.bucket_a || {};
  var gear = ba.gear || '?';
  var rpm  = ba.rpm_center ? Math.round(ba.rpm_center) : '?';
  var vss  = ba.vss_center ? Math.round(ba.vss_center) : '?';
  var tps  = ba.tps_center != null ? ba.tps_center.toFixed(1) : '?';

  var badges = buildBadges(c);

  var headerHtml = '<div class="card-header" onclick="toggleCard(this)">' +
    '<div class="cid">' + c.cluster_id + '</div>' +
    '<div class="n-badge ' + nClass + '">N=' + c.n + '</div>' +
    '<div class="bucket-badge"><span>' + gear + 'a</span>' + rpm + 'rpm<span style="margin:0 3px">·</span>' + vss + 'kph<span style="margin:0 3px">·</span>' + tps + '%TPS</div>' +
    badges +
    (c.orphan ? '' : '<div class="dtw-range">DTW ' + c.dtw_min + '-' + c.dtw_max + '</div>') +
    '<button class="toggle-btn">▼</button>' +
    '</div>';

  var bodyHtml = '<div class="card-body">' +
    buildChartRow(c, ci) +
    buildMembersTable(c) +
    '</div>';

  div.innerHTML = headerHtml + bodyHtml;
  return div;
}

function buildBadges(c) {
  var out = '<div class="context-badges">';
  if (!c.bucket_a_ok) out += '<div class="cbadge warn">⚠ BucketA mixed</div>';
  if (c.has_very_short) out += '<div class="cbadge info">⚡ &lt;0.5s events</div>';
  if (c.orphan) out += '<div class="cbadge info">orphan</div>';
  if (c.stats && c.stats.pw_diff_max > 0.3) {
    out += '<div class="cbadge alert">⚠ PW imbalance ' + c.stats.pw_diff_max.toFixed(2) + 'ms</div>';
  }
  out += '</div>';
  return out;
}

function toggleCard(hdr) {
  var body = hdr.nextElementSibling;
  var btn  = hdr.querySelector('.toggle-btn');
  var open = body.classList.toggle('open');
  btn.textContent = open ? '▲' : '▼';
  if (open) {
    // Draw charts now that canvas has size
    var canvases = body.querySelectorAll('canvas');
    canvases.forEach(function(cv) {
      drawPWChart(cv);
    });
  }
}

// ── Chart row ────────────────────────────────────────────────────────────────
function buildChartRow(c, ci) {
  if (!c.stats) return '';
  var pwData = JSON.stringify({
    avg:  c.stats.pw_avg,
    pw1:  c.stats.pw1_avg,
    pw2:  c.stats.pw2_avg,
    conf: c.stats.confidence
  });
  return '<div class="chart-row">' +
    '<div class="chart-wrap">' +
    '<div class="chart-label">PW (ms) — avg / pw1 / pw2 · confidence band</div>' +
    '<div class="chart-canvas-wrap"><canvas data-pw=\'' + pwData + '\'></canvas></div>' +
    '</div>' +
    '</div>';
}

function drawPWChart(canvas) {
  var raw = canvas.getAttribute('data-pw');
  if (!raw) return;
  var d;
  try { d = JSON.parse(raw); } catch(e) { return; }

  var wrap = canvas.parentElement;
  var W = wrap.clientWidth || 300;
  var H = wrap.clientHeight || 80;
  var dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var n    = d.avg.length;
  var pad  = {l:28, r:6, t:6, b:16};
  var cw   = W - pad.l - pad.r;
  var ch   = H - pad.t - pad.b;

  var allVals = d.avg.concat(d.pw1 || [], d.pw2 || []);
  var yMin = Math.min.apply(null, allVals);
  var yMax = Math.max.apply(null, allVals);
  var yRange = yMax - yMin || 1;

  function xp(i)  { return pad.l + (i / (n - 1)) * cw; }
  function yp(v)  { return pad.t + ch - ((v - yMin) / yRange) * ch; }

  // background
  ctx.fillStyle = '#0a0a0b';
  ctx.fillRect(0, 0, W, H);

  // confidence band (±std around avg, opacity = confidence)
  for (var i = 0; i < n - 1; i++) {
    var conf = (d.conf[i] + d.conf[i + 1]) / 2;
    var std  = 0.3; // visual band width in ms
    ctx.fillStyle = 'rgba(232,66,10,' + (conf * 0.18) + ')';
    var x0 = xp(i), x1 = xp(i + 1);
    var y0a = yp(d.avg[i] + std), y0b = yp(d.avg[i] - std);
    var y1a = yp(d.avg[i+1] + std), y1b = yp(d.avg[i+1] - std);
    ctx.beginPath();
    ctx.moveTo(x0, y0a); ctx.lineTo(x1, y1a);
    ctx.lineTo(x1, y1b); ctx.lineTo(x0, y0b);
    ctx.closePath(); ctx.fill();
  }

  // pw1 thin line
  if (d.pw1) {
    ctx.strokeStyle = 'rgba(61,158,255,0.45)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    d.pw1.forEach(function(v, i) { i === 0 ? ctx.moveTo(xp(i), yp(v)) : ctx.lineTo(xp(i), yp(v)); });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // pw2 thin line
  if (d.pw2) {
    ctx.strokeStyle = 'rgba(44,221,110,0.45)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    d.pw2.forEach(function(v, i) { i === 0 ? ctx.moveTo(xp(i), yp(v)) : ctx.lineTo(xp(i), yp(v)); });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // avg thick line
  ctx.strokeStyle = '#e8420a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  d.avg.forEach(function(v, i) { i === 0 ? ctx.moveTo(xp(i), yp(v)) : ctx.lineTo(xp(i), yp(v)); });
  ctx.stroke();

  // Y axis labels
  ctx.fillStyle = '#55555e';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(yMax.toFixed(1), pad.l - 2, pad.t + 6);
  ctx.fillText(yMin.toFixed(1), pad.l - 2, pad.t + ch);

  // X axis labels
  ctx.textAlign = 'center';
  ctx.fillText('0', pad.l, H - 2);
  ctx.fillText('t', pad.l + cw, H - 2);
}

// ── Members table ─────────────────────────────────────────────────────────────
function buildMembersTable(c) {
  if (!c.members || c.members.length === 0) return '';
  var html = '<table class="members-table"><thead><tr>' +
    '<th>Ride</th><th>t (s)</th><th>Gear</th><th>RPM</th><th>TPS%</th><th>VSS</th><th>PW→peak</th><th>dVSS</th><th>dur</th>' +
    '</tr></thead><tbody>';
  c.members.forEach(function(m) {
    var ba = m.bucket_a || {};
    html += '<tr>' +
      '<td>' + (m.ride_file || '?') + '</td>' +
      '<td>' + (m.break_t || '') + '</td>' +
      '<td>' + (ba.gear || '') + 'a</td>' +
      '<td>' + (ba.rpm_avg ? Math.round(ba.rpm_avg) : '') + '</td>' +
      '<td>' + (ba.tps_avg != null ? ba.tps_avg.toFixed(1) : '') + '</td>' +
      '<td>' + (ba.vss_avg ? Math.round(ba.vss_avg) : '') + '</td>' +
      '<td>' + (m.pw_start != null ? m.pw_start.toFixed(2) : '') + '→' + (m.pw_peak != null ? m.pw_peak.toFixed(2) : '') + '</td>' +
      '<td style="color:' + (m.vss_delta > 0 ? 'var(--gn)' : 'var(--rd)') + '">' + (m.vss_delta != null ? (m.vss_delta > 0 ? '+' : '') + m.vss_delta.toFixed(1) : '') + '</td>' +
      '<td>' + (m.duration != null ? m.duration.toFixed(1) : '') + 's</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  return html;
}
</script>
</body>
</html>
