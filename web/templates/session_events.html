<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Session Events — Buell Logger</title>
<style>
:root{--bg:#0a0a0b;--p:#111114;--bd:#1e1e24;--ac:#e8420a;--a2:#f5a623;--bl:#3d9eff;--gn:#2cdd6e;--dm:#55555e;--tx:#c8c8cc;--rd:#ff4444;--mn:'Share Tech Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:14px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

/* ── Header ─────────────────────────────────────────────────── */
.hdr{background:var(--p);border-bottom:2px solid var(--ac);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr-title{font-size:13px;font-weight:900;color:#fff;font-family:var(--mn);letter-spacing:.04em}
.hdr-nav{display:flex;gap:6px}
.hdr-nav a{font-family:var(--mn);font-size:9px;color:var(--dm);text-decoration:none;border:1px solid var(--bd);padding:3px 8px;border-radius:2px}
.hdr-nav a:hover{color:var(--bl);border-color:var(--bl)}
.hdr-nav a.active{color:var(--ac);border-color:var(--ac)}

/* ── Main split layout ───────────────────────────────────────── */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── Left panel ─────────────────────────────────────────────── */
.left{width:200px;flex-shrink:0;background:var(--p);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.left-controls{padding:8px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ctrl-group{display:flex;flex-direction:column;gap:2px}
.ctrl-group label{font-family:var(--mn);font-size:7px;color:var(--a2);letter-spacing:.12em;text-transform:uppercase}
.ctrl-group select{background:var(--bg);border:1px solid var(--bd);color:#fff;font-family:var(--mn);font-size:10px;padding:4px 6px;border-radius:2px;cursor:pointer;width:100%}
.btn{font-family:var(--mn);font-size:10px;font-weight:700;background:var(--ac);color:#fff;border:none;padding:5px 10px;border-radius:2px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;width:100%}
.btn:hover{filter:brightness(1.15)}
.btn:disabled{opacity:.4;cursor:default}
.status-line{font-family:var(--mn);font-size:8px;color:var(--dm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-line.err{color:var(--rd)}.status-line.ok{color:var(--gn)}.status-line.loading{color:var(--a2)}

.cluster-list{flex:1;overflow-y:auto;padding:4px}
.cluster-list-label{font-family:var(--mn);font-size:7px;color:var(--dm);letter-spacing:.1em;text-transform:uppercase;padding:4px 4px 2px}
.chip{padding:5px 7px;border:1px solid var(--bd);border-left:3px solid transparent;border-radius:2px;cursor:pointer;margin-bottom:3px;transition:border-color .1s,background .1s}
.chip:hover{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.chip.active{border-left-color:var(--ac);border-color:rgba(232,66,10,.4);background:rgba(232,66,10,.06)}
.chip-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.chip-id{font-family:var(--mn);font-size:8px;color:var(--dm)}
.chip-n{font-family:var(--mn);font-size:11px;font-weight:900;color:var(--tx)}
.chip-n.high{color:var(--gn)}.chip-n.med{color:var(--a2)}.chip-n.low{color:var(--dm)}
.chip-bucket{font-family:var(--mn);font-size:9px;color:var(--tx)}
.chip-bucket span{color:var(--a2)}
.chip-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.cb{font-family:var(--mn);font-size:7px;padding:1px 4px;border-radius:1px;border:1px solid}
.cb-ok{color:var(--gn);border-color:rgba(44,221,110,.3)}
.cb-warn{color:var(--a2);border-color:rgba(245,166,35,.3)}
.cb-info{color:var(--dm);border-color:var(--bd)}
.cb-alert{color:var(--rd);border-color:rgba(255,68,68,.3)}

/* ── Right panel ─────────────────────────────────────────────── */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.chart-area{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;padding:8px 10px 6px}
.chart-title{font-family:var(--mn);font-size:9px;color:var(--dm);flex-shrink:0;margin-bottom:4px;letter-spacing:.04em}
.chart-wrap{flex:1;min-height:0;position:relative}
.chart-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}

.legend{flex-shrink:0;display:flex;gap:12px;padding:4px 0 2px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-family:var(--mn);font-size:8px;color:var(--dm)}
.leg-line{width:18px;height:2px;border-radius:1px}
.leg-dot{width:8px;height:2px;border-top:1px dashed}

.info-bar{flex-shrink:0;border-top:1px solid var(--bd);background:var(--p);padding:6px 10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;min-height:32px}
.info-stat{font-family:var(--mn);font-size:9px;display:flex;gap:4px}
.info-stat .k{color:var(--dm);font-size:7px;text-transform:uppercase;letter-spacing:.08em;align-self:center}
.info-stat .v{color:var(--tx);font-weight:700}
.info-badges{display:flex;gap:4px;flex-wrap:wrap}

.members-strip{flex-shrink:0;border-top:1px solid var(--bd);max-height:120px;overflow-y:auto}
table.mt{width:100%;border-collapse:collapse;font-family:var(--mn);font-size:8px}
table.mt thead tr{background:var(--p);position:sticky;top:0;z-index:1}
table.mt th{padding:3px 6px;text-align:right;font-size:7px;color:var(--dm);font-weight:700;letter-spacing:.06em;border-bottom:1px solid var(--bd)}
table.mt th:first-child{text-align:left}
table.mt td{padding:2px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03)}
table.mt td:first-child{text-align:left}
table.mt tr:hover td{background:rgba(255,255,255,.02)}

.empty{flex:1;display:flex;align-items:center;justify-content:center;font-family:var(--mn);font-size:11px;color:var(--dm);flex-direction:column;gap:8px}
.empty span{font-size:28px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">BUELL LOGGER — SESSION EVENTS</div>
  <div class="hdr-nav">
    <a href="/">Dashboard</a>
    <a href="/sessions_vs">VS</a>
    <a href="/sessions_launch">Launch</a>
    <a href="/session_events" class="active">Events</a>
  </div>
</div>

<div class="main">
  <!-- ── Left panel ── -->
  <div class="left">
    <div class="left-controls">
      <div class="ctrl-group">
        <label>Session</label>
        <select id="selSession"></select>
      </div>
      <div class="ctrl-group">
        <label>DTW Threshold</label>
        <select id="selThresh">
          <option value="0.80">0.80 — loose</option>
          <option value="0.85" selected>0.85 — default</option>
          <option value="0.90">0.90 — strict</option>
          <option value="0.95">0.95 — very strict</option>
        </select>
      </div>
      <button class="btn" id="btnLoad" onclick="loadSession()">LOAD</button>
      <div class="status-line" id="status">Select a session</div>
    </div>
    <div class="cluster-list" id="clusterList">
      <div class="cluster-list-label">CLUSTERS</div>
    </div>
  </div>

  <!-- ── Right panel ── -->
  <div class="right" id="rightPanel">
    <div class="empty"><span>⚡</span>Select a session and press LOAD</div>
  </div>
</div>

<script>
var DATA         = null;
var activeCluster = null;

// ── Palette for individual event lines ───────────────────────────────────────
function eventColor(i, n, alpha) {
  var hue = (i / Math.max(n, 1)) * 300 + 180; // blue→green range
  return 'hsla(' + hue + ',70%,60%,' + alpha + ')';
}

// ── Session list ─────────────────────────────────────────────────────────────
fetch('/rides')
  .then(function(r){ return r.json(); })
  .then(function(data) {
    var rides = data.rides || data;
    var seen  = {};
    rides.forEach(function(r) {
      var sid = r.session || r.id || r.checksum;
      if (!sid) return;
      if (!seen[sid] || (r.ride_num||0) > (seen[sid].ride_num||0)) seen[sid] = r;
    });
    var sel = document.getElementById('selSession');
    Object.values(seen)
      .sort(function(a,b){ return (b.opened_utc||'').localeCompare(a.opened_utc||''); })
      .forEach(function(s) {
        var sid  = s.session || s.id || s.checksum;
        var fw   = s.firmware ? '  ' + s.firmware : '';
        var date = s.opened_utc ? '  ' + s.opened_utc.slice(0,10) : '';
        var opt  = document.createElement('option');
        opt.value = sid;
        opt.textContent = sid + fw + date;
        sel.appendChild(opt);
      });
  })
  .catch(function(){ setStatus('Could not load sessions', 'err'); });

// ── Load ─────────────────────────────────────────────────────────────────────
function loadSession() {
  var sid    = document.getElementById('selSession').value;
  var thresh = document.getElementById('selThresh').value;
  if (!sid) return;
  document.getElementById('btnLoad').disabled = true;
  setStatus('Processing…', 'loading');
  document.getElementById('clusterList').innerHTML = '<div class="cluster-list-label">CLUSTERS</div>';
  document.getElementById('rightPanel').innerHTML  = '<div class="empty"><span>⏳</span>Detecting events…</div>';

  fetch('/session_events/data?session=' + sid + '&threshold=' + thresh)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      document.getElementById('btnLoad').disabled = false;
      if (d.error) { setStatus('Error: ' + d.error, 'err'); return; }
      DATA = d;
      setStatus(d.n_rides + 'r · ' + d.n_events + 'ev · ' + d.n_clusters + 'cl', 'ok');
      renderClusters(d.clusters);
      if (d.clusters && d.clusters.length) selectCluster(d.clusters[0]);
    })
    .catch(function(e){ document.getElementById('btnLoad').disabled=false; setStatus('Request failed','err'); });
}

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-line' + (cls ? ' ' + cls : '');
}

// ── Cluster list ─────────────────────────────────────────────────────────────
function renderClusters(clusters) {
  var list = document.getElementById('clusterList');
  list.innerHTML = '<div class="cluster-list-label">CLUSTERS</div>';
  clusters.forEach(function(c, i) {
    var chip = document.createElement('div');
    chip.className = 'chip' + (c.orphan ? '' : '');
    chip.dataset.cid = c.cluster_id;

    var ba  = c.bucket_a || {};
    var nCl = c.n >= 5 ? 'high' : c.n >= 2 ? 'med' : 'low';
    var baBadge = c.bucket_a_ok
      ? '<div class="cb cb-ok">A-OK</div>'
      : '<div class="cb cb-warn">A-MIX</div>';
    var orphanBadge = c.orphan ? '<div class="cb cb-info">orphan</div>' : '';
    var imbalBadge  = (c.stats && c.stats.pw_diff_max > 0.3)
      ? '<div class="cb cb-alert">⚠imbal</div>' : '';
    var tpsLabel = '';
    if (c.members && c.members.length) {
      var avgPeak = c.members.reduce(function(s,m){ return s + (m.tps_peak||0); },0) / c.members.length;
      tpsLabel = avgPeak >= 90 ? '  WOT' : avgPeak >= 50 ? '  mid' : '  light';
    }

    chip.innerHTML =
      '<div class="chip-top">' +
        '<div class="chip-id">' + c.cluster_id + tpsLabel + '</div>' +
        '<div class="chip-n ' + nCl + '">N=' + c.n + '</div>' +
      '</div>' +
      '<div class="chip-bucket">' +
        '<span>' + (ba.gear||'?') + 'a</span> ' +
        Math.round(ba.rpm_center||0) + 'rpm · ' +
        Math.round(ba.vss_center||0) + 'kph' +
      '</div>' +
      '<div class="chip-badges">' + baBadge + orphanBadge + imbalBadge + '</div>';

    chip.addEventListener('click', function(){ selectCluster(c); });
    list.appendChild(chip);
  });
}

// ── Select & display cluster ──────────────────────────────────────────────────
function selectCluster(c) {
  activeCluster = c;
  // highlight chip
  document.querySelectorAll('.chip').forEach(function(el){
    el.classList.toggle('active', el.dataset.cid === c.cluster_id);
  });
  buildRightPanel(c);
}

function buildRightPanel(c) {
  var ba   = c.bucket_a  || {};
  var st   = c.stats     || {};
  var memb = c.members   || [];

  var avgTpsPeak = memb.length
    ? (memb.reduce(function(s,m){ return s+(m.tps_peak||0); },0)/memb.length).toFixed(0) + '%'
    : '?';

  // Title string
  var title = c.cluster_id + ' · ' + (ba.gear||'?') + 'a · ' +
    Math.round(ba.rpm_center||0) + 'rpm ±' + Math.round(ba.rpm_range||0) +
    ' · ' + Math.round(ba.vss_center||0) + 'kph · TPS→' + avgTpsPeak +
    '  [N=' + c.n + (c.orphan ? ' orphan' : '') + ']';

  // Info stats
  var infoParts = [
    infoStat('Gear', (ba.gear||'?') + 'a'),
    infoStat('RPM', Math.round(ba.rpm_center||0) + ' ±' + Math.round(ba.rpm_range||0)),
    infoStat('TPS₀', (ba.tps_center||0).toFixed(1) + '%'),
    infoStat('VSS', Math.round(ba.vss_center||0) + ' kph'),
    infoStat('DTW', c.dtw_min + '–' + c.dtw_max),
  ];
  if (st.pw_diff_max != null) infoParts.push(infoStat('PW imbal', st.pw_diff_max.toFixed(2) + 'ms'));

  var badges = '';
  if (!c.bucket_a_ok) badges += '<div class="cb cb-warn">⚠ BucketA mixed</div>';
  if (c.has_very_short) badges += '<div class="cb cb-info">⚡ &lt;0.5s members</div>';

  // Members table
  var tableRows = memb.map(function(m, i) {
    var mba = m.bucket_a || {};
    var dot = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' +
              eventColor(i, memb.length, 0.9) + ';margin-right:3px"></span>';
    return '<tr>' +
      '<td>' + dot + (m.ride_file||'?').replace('ride_','').replace('_f7events','') + '</td>' +
      '<td>' + (m.break_t||'') + 's</td>' +
      '<td>' + (mba.gear||'') + 'a</td>' +
      '<td>' + Math.round(mba.rpm_avg||0) + '</td>' +
      '<td>' + (mba.tps_avg||0).toFixed(1) + '</td>' +
      '<td>' + Math.round(mba.vss_avg||0) + '</td>' +
      '<td>' + (m.pw_start||0).toFixed(2) + '→' + (m.pw_peak||0).toFixed(2) + '</td>' +
      '<td style="color:' + ((m.vss_delta||0)>0 ? 'var(--gn)' : 'var(--rd)') + '">' +
        ((m.vss_delta||0)>0?'+':'') + (m.vss_delta||0).toFixed(1) + '</td>' +
      '<td>' + (m.duration||0).toFixed(1) + 's</td>' +
      '</tr>';
  }).join('');

  var html =
    '<div class="chart-area">' +
      '<div class="chart-title" id="chartTitle">' + escHtml(title) + '</div>' +
      '<div class="chart-wrap"><canvas id="mainChart"></canvas></div>' +
      '<div class="legend">' +
        '<div class="leg-item"><div class="leg-line" style="background:var(--ac);height:2.5px"></div> avg PW</div>' +
        '<div class="leg-item"><div class="leg-dot" style="border-color:var(--bl)"></div> pw1 avg</div>' +
        '<div class="leg-item"><div class="leg-dot" style="border-color:var(--gn)"></div> pw2 avg</div>' +
        '<div class="leg-item"><div class="leg-line" style="background:rgba(180,180,200,0.35)"></div> each event</div>' +
      '</div>' +
    '</div>' +
    '<div class="info-bar">' +
      infoParts.join('') +
      '<div class="info-badges">' + badges + '</div>' +
    '</div>' +
    '<div class="members-strip">' +
      '<table class="mt"><thead><tr>' +
        '<th style="text-align:left">Ride</th><th>t(s)</th><th>Gear</th><th>RPM</th><th>TPS%</th><th>VSS</th><th>PW→peak</th><th>dVSS</th><th>dur</th>' +
      '</tr></thead><tbody>' + tableRows + '</tbody></table>' +
    '</div>';

  document.getElementById('rightPanel').innerHTML = html;
  drawClusterChart(c);
}

function infoStat(k, v) {
  return '<div class="info-stat"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>';
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Chart ─────────────────────────────────────────────────────────────────────
function drawClusterChart(c) {
  var canvas = document.getElementById('mainChart');
  if (!canvas) return;
  var wrap = canvas.parentElement;
  var dpr  = window.devicePixelRatio || 1;
  var W    = wrap.clientWidth  || 600;
  var H    = wrap.clientHeight || 300;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  var st   = c.stats   || {};
  var memb = c.members || [];
  var N    = 20;

  // Y range from all data
  var allVals = (st.pw_avg || []).slice();
  memb.forEach(function(m){ (m.pw_curve||[]).forEach(function(v){ allVals.push(v); }); });
  if (!allVals.length) return;
  var yMin = Math.min.apply(null, allVals);
  var yMax = Math.max.apply(null, allVals);
  var pad  = Math.max((yMax - yMin) * 0.12, 0.3);
  yMin -= pad; yMax += pad;

  var TM = 14, BM = 20, LM = 34, RM = 10;
  var PW = W - LM - RM;
  var PH = H - TM - BM;

  function xp(i) { return LM + (i / (N - 1)) * PW; }
  function yp(v) { return TM + PH - ((v - yMin) / (yMax - yMin)) * PH; }

  // Background
  ctx.fillStyle = '#0a0a0b';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var g = 1; g <= 3; g++) {
    var yg = TM + PH * g / 4;
    ctx.beginPath(); ctx.moveTo(LM, yg); ctx.lineTo(LM + PW, yg); ctx.stroke();
  }

  // X axis ticks (point indices labelled 0, 5, 10, 15, 20)
  ctx.font = '7px monospace'; ctx.textAlign = 'center';
  [0, 5, 10, 15, 19].forEach(function(i) {
    var x = xp(i);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, TM); ctx.lineTo(x, TM + PH); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(i === 0 ? '0' : i === 19 ? 'end' : i, x, H - 5);
  });

  // t=0 marker
  ctx.strokeStyle = 'rgba(232,66,10,0.4)';
  ctx.setLineDash([4, 4]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(xp(0), TM); ctx.lineTo(xp(0), TM + PH); ctx.stroke();
  ctx.setLineDash([]);

  // Y axis labels
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '7px monospace';
  var ySteps = 4;
  for (var ys = 0; ys <= ySteps; ys++) {
    var yVal = yMin + (yMax - yMin) * ys / ySteps;
    var yPos = TM + PH - (ys / ySteps) * PH;
    ctx.fillText(yVal.toFixed(1), LM - 2, yPos + 3);
  }
  // Y axis label
  ctx.save();
  ctx.translate(10, TM + PH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '7px monospace';
  ctx.fillText('PW (ms)', 0, 0);
  ctx.restore();

  // Confidence band around avg
  if (st.pw_avg && st.pw_std && st.confidence) {
    for (var i2 = 0; i2 < N - 1; i2++) {
      var conf = (st.confidence[i2] + st.confidence[i2+1]) / 2;
      var std2  = (st.pw_std[i2] + st.pw_std[i2+1]) / 2;
      ctx.fillStyle = 'rgba(232,66,10,' + (conf * 0.12) + ')';
      var x0 = xp(i2), x1 = xp(i2+1);
      var ya0 = yp(st.pw_avg[i2] + std2), ya1 = yp(st.pw_avg[i2+1] + std2);
      var yb0 = yp(st.pw_avg[i2] - std2), yb1 = yp(st.pw_avg[i2+1] - std2);
      ctx.beginPath();
      ctx.moveTo(x0, ya0); ctx.lineTo(x1, ya1);
      ctx.lineTo(x1, yb1); ctx.lineTo(x0, yb0);
      ctx.closePath(); ctx.fill();
    }
  }

  // Individual event lines
  memb.forEach(function(m, idx) {
    var curve = m.pw_curve;
    if (!curve || curve.length < 2) return;
    ctx.strokeStyle = eventColor(idx, memb.length, 0.45);
    ctx.lineWidth = 1;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    curve.forEach(function(v, i) {
      i === 0 ? ctx.moveTo(xp(i), yp(v)) : ctx.lineTo(xp(i), yp(v));
    });
    ctx.stroke();
  });

  // pw1 avg dashed
  if (st.pw1_avg) {
    ctx.strokeStyle = 'rgba(61,158,255,0.6)';
    ctx.lineWidth = 1.2; ctx.setLineDash([5, 4]);
    ctx.beginPath();
    st.pw1_avg.forEach(function(v, i) {
      i===0 ? ctx.moveTo(xp(i),yp(v)) : ctx.lineTo(xp(i),yp(v));
    });
    ctx.stroke(); ctx.setLineDash([]);
  }

  // pw2 avg dashed
  if (st.pw2_avg) {
    ctx.strokeStyle = 'rgba(44,221,110,0.6)';
    ctx.lineWidth = 1.2; ctx.setLineDash([5, 4]);
    ctx.beginPath();
    st.pw2_avg.forEach(function(v, i) {
      i===0 ? ctx.moveTo(xp(i),yp(v)) : ctx.lineTo(xp(i),yp(v));
    });
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Average line — thick orange
  if (st.pw_avg) {
    ctx.strokeStyle = '#e8420a';
    ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    ctx.beginPath();
    st.pw_avg.forEach(function(v, i) {
      i===0 ? ctx.moveTo(xp(i),yp(v)) : ctx.lineTo(xp(i),yp(v));
    });
    ctx.stroke();
  }

  // Endpoint dots on avg
  if (st.pw_avg) {
    [0, N-1].forEach(function(i) {
      ctx.beginPath();
      ctx.arc(xp(i), yp(st.pw_avg[i]), 3, 0, 2*Math.PI);
      ctx.fillStyle = '#e8420a'; ctx.fill();
    });
  }
}

// Redraw on resize
window.addEventListener('resize', function() {
  if (activeCluster) drawClusterChart(activeCluster);
});
</script>
</body>
</html>
