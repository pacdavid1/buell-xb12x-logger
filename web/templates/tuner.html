<html lang="es"><head><meta charset="UTF-8">

<style>
:root{--bg:#0a0a0b;--p:#111114;--bd:#1e1e24;--ac:#e8420a;--a2:#f5a623;--bl:#3d9eff;--dm:#555;--tx:#c8c8cc;--rd:#ff4444;--mn:'JetBrains Mono',monospace}

.tab:last-child{border-right:none}

.ps{overflow-x:auto;overflow-y:auto;flex:0 0 55%}
.pi{display:inline-flex;min-width:100%;justify-content:center}

.tw.tm table{border-left:2px solid var(--a2)}
table.v{border-collapse:collapse;font-family:var(--mn);white-space:nowrap}
table.v caption{font-size:7px;color:var(--ac);padding:1px 3px;text-align:left;letter-spacing:.1em;font-weight:700}
table.v th{font-size:6px;color:var(--dm);padding:0 1px;text-align:center;min-width:22px}
table.v th.r{text-align:right;min-width:24px;padding-right:2px}
table.v td{width:26px;height:16px;border:1px solid rgba(255,255,255,.03);text-align:center;vertical-align:middle;font-size:7px;font-weight:700;color:#fff}
.dpp{color:#fff;background:rgba(255,50,50,.25)!important}.dp{color:var(--rd)}
.dnn{color:#fff;background:rgba(50,130,255,.25)!important}.dn{color:var(--bl)}
.dzz{color:#444!important;background:rgba(255,255,255,.01)!important}
.g3{display:flex;gap:0;flex:1;min-height:120px;overflow:hidden;border:none;border-top:1px solid rgba(255,255,255,.03)}
.g3c{flex:1;min-width:200px;display:flex;flex-direction:column;overflow:hidden;background:var(--p)}
.g3c:first-child{border-right:none}

.g3t{font-family:var(--mn);font-size:8px;font-weight:700;color:var(--a2);padding:2px 6px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.02);flex-shrink:0}
.g3c canvas{display:block;flex:1;touch-action:none;max-width:100%;max-height:100%}
.leg{display:flex;align-items:center;gap:3px;font-family:var(--mn);font-size:6px;color:var(--dm);padding:2px 6px;border-top:1px solid var(--bd);flex-shrink:0}
.leg .bar{flex:1;height:5px;border-radius:2px}
.vb{font-family:var(--mn);font-size:7px;color:var(--dm);border:1px solid var(--bd);padding:2px 5px;border-radius:2px;cursor:pointer;user-select:none;background:transparent}
.vb:hover{color:var(--bl);border-color:var(--bl)}
.vb.dm.on{color:var(--ac);border-color:var(--ac)}
.cd-mc{display:flex;gap:4px;align-items:center;padding:4px 8px;background:var(--p);border:1px solid var(--bd);border-radius:3px;flex-shrink:0}
.cd-mc .vb{font-size:7px}
.mc-go{padding:3px 10px;font-family:var(--mn);font-size:8px;font-weight:700;color:#fff;background:var(--ac);border:none;border-radius:2px;cursor:pointer;letter-spacing:.06em}
.mc-go:hover{background:#ff5520}
.mc-go:disabled{background:#333;color:#666;cursor:not-allowed}
.fuel-bar-track{height:4px;background:#111;width:100%}
.fuel-bar-fill{height:100%;width:0%;transition:width .8s ease,background .5s}
</style></head><body>

<div class="ct">
<div class="cg"><div style="display:flex;align-items:center;gap:5px"><label>Base</label><span class="vb" onclick="dlMsq('sB')" title="Download Base session EEPROM as MSQ" style="font-size:7px;padding:1px 4px">&#11015; msq</span></div><select id="sB"><option value="">--</option></select></div>

<div class="c3bar" style="display:flex;gap:8px;align-items:center;padding:4px 8px;background:var(--p);border:1px solid var(--bd);border-radius:3px;flex-shrink:0">

<span style="font-family:var(--mn);font-size:7px;color:#3399ff">ROL</span>
<input type="text" inputmode="numeric" id="inVal" value="0" onkeydown="fixArrow(event,360)" style="width:42px;background:var(--bg);border:1px solid var(--bd);color:#fff;font-family:var(--mn);font-size:10px;padding:2px 4px;border-radius:2px;text-align:center" oninput="applyAngles()">
<span class="vb" onclick="setView(150,20,0)" title="View from rear-top (default)">T</span><span class="vb" onclick="setView(245,15,0)" title="View from rear">R</span><span class="vb" onclick="setView(245,0,0)" title="View from front">F</span><span class="vb" onclick="setView(275,20,0)" title="Side angle">S</span><span style="font-family:var(--mn);font-size:7px;color:var(--bl)" title="Value height scale">ALT</span>
<input type="range" id="inZoom" min="0.1" max="3.0" step="0.05" value="1.0" oninput="applyAngles()" style="width:60px;accent-color:var(--bl);vertical-align:middle;height:14px">
<span id="zoomVal" style="font-family:var(--mn);font-size:8px;color:var(--bl);min-width:20px;text-align:center">1.0</span>
<span style="font-family:var(--mn);font-size:7px;color:var(--a2)" title="Camera zoom (mouse wheel on canvas)">ZOOM</span>
<input type="range" id="inCam" min="0.3" max="2.5" step="0.05" value="1.0" oninput="applyAngles()" style="width:60px;accent-color:var(--a2);vertical-align:middle;height:14px">
<span id="camVal" style="font-family:var(--mn);font-size:8px;color:var(--a2);min-width:24px;text-align:center">1.00</span>

<span style="font-family:var(--mn);font-size:7px;color:var(--dm);margin-left:4px">INV</span>
<span class="vb" id="invX" onclick="toggleInv('X')">X</span>
<span class="vb" id="invY" onclick="toggleInv('Y')">Y</span>
<span class="vb" id="invZ" onclick="toggleInv('Z')">Z</span>
<span class="vb" onclick="snapshotAll3D()" title="Export 3D views as PNG" style="margin-left:8px;color:var(--a2)">PNG</span>
</div>
<div class="g3">
<div class="g3c"><div class="g3t">BASE 3D</div><canvas id="c3b"></canvas><div class="leg" id="lb"></div></div>
<div class="g3c"><div class="g3t">DELTA 3D</div><canvas id="c3d"></canvas><div class="leg" id="ld"></div></div>
<div class="g3c"><div class="g3t">MOD 3D</div><canvas id="c3m"></canvas><div class="leg" id="lm"></div></div>
</div>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
var mB=null,mM=null,mMerge=null,mergeMode='BALANCE',cur='';
var STAGE={},MAX_STAGE_CELLS=20;

function dlMsq(selId) {
  var sid = document.getElementById(selId).value;
  if (!sid) { alert('Select a session first'); return; }
  var url = '/eeprom/msq?session=' + encodeURIComponent(sid);
  fetch(url).then(function(r) {
    if (!r.ok) { return r.json().then(function(d){ alert('Error: '+(d.error||r.status)); }); }
    var cd = r.headers.get('Content-Disposition') || '';
    var m  = cd.match(/filename="([^"]+)"/);
    var fname = m ? m[1] : 'eeprom_' + sid + '.msq';
    return r.blob().then(function(b) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(b); a.download = fname; a.click();
    });
  }).catch(function(e){ alert('Download error: ' + e.message); });
}
var SC={fuel_map_front:0.50,fuel_map_rear:0.50,timing_table_front:0.30,timing_table_rear:0.30,'2nd_fuel_map_front':0.50,'2nd_fuel_map_rear':0.50,delta:0.08};
var CAM={zoom:1};
var CAM_STORE_KEY='buell_cam_3d';
function saveCameraState(){try{localStorage.setItem(CAM_STORE_KEY,JSON.stringify({tps:document.getElementById('inTps').value,rpm:document.getElementById('inRpm').value,val:document.getElementById('inVal').value,zoom:document.getElementById('inZoom').value,cam:document.getElementById('inCam').value}));}catch(e){}}
function loadCameraState(){try{var s=localStorage.getItem(CAM_STORE_KEY);if(!s)return;var c=JSON.parse(s);if(c.tps!=null)document.getElementById('inTps').value=c.tps;if(c.rpm!=null)document.getElementById('inRpm').value=c.rpm;if(c.val!=null)document.getElementById('inVal').value=c.val;if(c.zoom!=null)document.getElementById('inZoom').value=c.zoom;if(c.cam!=null)document.getElementById('inCam').value=c.cam;applyAngles();}catch(e){}}
var C3={base:{ang:-0.65,tilt:0.88,roll:0,drag:false,lx:0,ly:0},delta:{ang:-0.65,tilt:0.88,roll:0,drag:false,lx:0,ly:0},mod:{ang:-0.65,tilt:0.88,roll:0,drag:false,lx:0,ly:0}};
var INV={X:false,Y:false,Z:false};
function toggleInv(ax){INV[ax]=!INV[ax];var el=document.getElementById('inv'+ax);el.style.color=INV[ax]?'var(--ac)':'';el.style.borderColor=INV[ax]?'var(--ac)':'';drawAll();}
function snapshotAll3D(){
  var entries=[{id:'c3b',name:'BASE'},{id:'c3d',name:'DELTA'},{id:'c3m',name:'MOD'}];
  var cs=entries.map(function(e){return{el:document.getElementById(e.id),name:e.name};});
  var w=cs[0].el.width,h=cs[0].el.height;
  if(!w||!h){st('3D not rendered — load maps first');return;}
  var PAD=2,LH=16;
  var tmp=document.createElement('canvas');
  tmp.width=w*3+PAD*2;tmp.height=h+LH;
  var ctx=tmp.getContext('2d');
  ctx.fillStyle='#1a1a1f';ctx.fillRect(0,0,tmp.width,tmp.height);
  ctx.font='bold 10px monospace';ctx.textAlign='center';
  for(var i=0;i<cs.length;i++){
    var x=i*(w+PAD);
    ctx.fillStyle='#888';ctx.fillText(cs[i].name,x+w/2,11);
    ctx.drawImage(cs[i].el,x,LH);
  }
  var mapId=cur.toUpperCase().replace('_','-');
  var sid=(document.getElementById('sM')||{}).value||'';
  var d=new Date();
  var ts=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var fname='3D_'+mapId+(sid?'_'+sid.slice(0,8):'')+('_'+ts)+'.png';
  tmp.toBlob(function(blob){
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();
    URL.revokeObjectURL(a.href);
  },'image/png');
}
var DM='delta';
var DM_IDS={delta:'dmD',overlay:'dmO',spikes:'dmS',wire:'dmW'};
function setDM(m){DM=m;var all=document.querySelectorAll('.vb.dm');for(var i=0;i<all.length;i++)all[i].classList.remove('on');document.getElementById(DM_IDS[m]).classList.add('on');drawAll();}
function setMergeMode(m){mergeMode=m;var all=document.querySelectorAll('.mc-m');for(var i=0;i<all.length;i++)all[i].classList.remove('on');document.getElementById(m==='BALANCE'?'mcB':m==='ECO'?'mcE':'mcS').classList.add('on');}

async function init(){
  try{
    var r=await fetch('/tuner/sessions');if(!r.ok)throw Error("HTTP "+r.status);var d=await r.json();
    if(!d.sessions||!d.sessions.length){st('No sessions with maps found');return}
  var o='<option value="">--</option>';
    for(var i=0;i<d.sessions.length;i++){var s=d.sessions[i];var sm=s.samples>=1000?(s.samples/1000).toFixed(1)+'k':s.samples;o+='<option value="'+s.id+'">'+s.id+' (S'+(s.serial||'?')+') '+s.created+' '+s.rides+'r·'+sm+'</option>'}
    document.getElementById('sB').innerHTML=o;document.getElementById('sM').innerHTML=o;
    st(d.sessions.length+' sessions available');
  }catch(e){st('Error: '+e.message)}
}
function st(t){document.getElementById('st').textContent=t}
async function load(t){
  var id=document.getElementById(t==='base'?'sB':'sM').value;if(!id)return;
  st('Loading '+id+'...');
  try{
    var r=await fetch('/tuner/maps?session='+id);if(!r.ok)throw Error("HTTP "+r.status);var d=await r.json();
    if(!d||!d.maps){st('Error: '+(d&&d.error||'no maps'));return}
    if(t==='base')mB=d;else mM=d;mMerge=null;
    if(mB&&(!cur||!mB.maps[cur])){var ks=Object.keys(mB.maps);var ks2d=ks.filter(function(k){return mB.maps[k].yaxis&&(mB.maps[k].rows||0)>1;});var def=ks2d.find(function(k){return k.indexOf('fuel')>=0;})||ks2d[0]||ks[0]||'';cur=def;var tb=document.getElementById('tabs');tb.innerHTML=ks2d.map(function(k){return'<button class="tab'+(k===cur?' on':'')+' data-m="'+k+'">'+mB.maps[k].label+'</button>';}).join('');}
    document.getElementById('mcGo').disabled=!(mB&&mM);
    render();
  }catch(e){st('Error loading')}
}

function heatRGB(t){
  var r,g,b;
  if(t<0.2){var s=t/0.2;r=15;g=Math.round(10+60*s);b=Math.round(80+140*s)}
  else if(t<0.4){var s=(t-0.2)/0.2;r=Math.round(15+20*s);g=Math.round(70+130*s);b=Math.round(220+35*s)}
  else if(t<0.6){var s=(t-0.4)/0.2;r=Math.round(35+120*s);g=Math.round(200+55*s);b=Math.round(255-155*s)}
  else if(t<0.8){var s=(t-0.6)/0.2;r=Math.round(155+100*s);g=Math.round(255-60*s);b=Math.round(100-70*s)}
  else{var s=(t-0.8)/0.2;r=255;g=Math.round(195-145*s);b=Math.round(30-10*s)}
  return'rgba('+r+','+g+','+b+',0.7)';
}

function render(){
  if(!mB||!mM)return;
  var mk=cur;
  var bMap=(mB.maps||{})[mk],mMap=(mM.maps||{})[mk];
  var bD=bMap?bMap.data:null,mD=mMap?mMap.data:null;
  if(!bD||!mD){document.getElementById('pw').innerHTML='<p style="padding:16px;color:#555">Map not available</p>';return}
  var xk=bMap.xaxis,yk=bMap.yaxis;
  var rpm=xk&&mB.axes[xk]?mB.axes[xk].data:[],lod=yk&&mB.axes[yk]?mB.axes[yk].data:[];
  var rows=lod.length,cols=rpm.length;
  if(bD.length!==mD.length||(bD[0]&&mD[0]&&bD[0].length!==mD[0].length)){st('Different map dimensions');return}
  var mx=0;
  for(var i=0;i<rows;i++)for(var j=0;j<cols;j++){var v=Math.abs(mD[i][j]-bD[i][j]);if(v>mx)mx=v}

  function range(data){var n=1e9,x=-1e9;for(var i=0;i<data.length;i++)for(var j=0;j<data[0].length;j++){if(data[i][j]<n)n=data[i][j];if(data[i][j]>x)x=data[i][j]}if(x===n)x=n+1;return[n,x]}
  function hdr(){var h='<tr><th></th>';for(var j=0;j<cols;j++)h+='<th>'+rpm[j]+'</th>';return h+'</tr>'}
  function tbl(data,cap){
    var rng=range(data),zN=rng[0],zX=rng[1];

      ctx.strokeStyle='rgba(60,120,255,'+(opa+0.2)+')';ctx.lineWidth=1.5;ctx.stroke();
    }
  } else if(DM==='spikes'){
    // BASE heatmap + spikes de delta por vertice
    var bf=sortedFaces(bD);
    for(var f=0;f<bf.length;f++){
      var fc=bf[f];
      ctx.beginPath();ctx.moveTo(fc.p[0][0],fc.p[0][1]);
      for(var k=1;k<4;k++)ctx.lineTo(fc.p[k][0],fc.p[k][1]);
      ctx.closePath();
      var nm=(fc.v-bN)/(bX-bN);
      ctx.fillStyle=heat(nm);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;ctx.stroke();
    }
    for(var i=0;i<R;i++)for(var j=0;j<Cl;j++){
      var d=mD[i][j]-bD[i][j];
      if(Math.abs(d)<0.5)continue;
      var pb=pr(j,i,bD[i][j]),pm=pr(j,i,mD[i][j]);
      ctx.beginPath();ctx.moveTo(pb[0],pb[1]);ctx.lineTo(pm[0],pm[1]);
      ctx.strokeStyle=d>0?'rgba(255,80,80,0.9)':'rgba(80,150,255,0.9)';
      ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(pm[0],pm[1],2,0,Math.PI*2);
      ctx.fillStyle=d>0?'rgba(255,80,80,0.9)':'rgba(80,150,255,0.9)';ctx.fill();
    }
  } else if(DM==='wire'){
    // Solid heatmap base + MOD wireframe
    var bf=sortedFaces(bD);
    for(var f=0;f<bf.length;f++){
      var fc=bf[f];
      ctx.beginPath();ctx.moveTo(fc.p[0][0],fc.p[0][1]);
      for(var k=1;k<4;k++)ctx.lineTo(fc.p[k][0],fc.p[k][1]);
      ctx.closePath();
      var nm=(fc.v-bN)/(bX-bN);
      ctx.fillStyle=heat(nm);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;ctx.stroke();
    }
    for(var i=0;i<R-1;i++)for(var j=0;j<Cl-1;j++){
      var p0=pr(j,i,mD[i][j]),p1=pr(j+1,i,mD[i][j+1]),p2=pr(j+1,i+1,mD[i+1][j+1]),p3=pr(j,i+1,mD[i+1][j]);
      ctx.beginPath();ctx.moveTo(p0[0],p0[1]);ctx.lineTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.lineTo(p3[0],p3[1]);ctx.closePath();
      var opa=parseFloat(document.getElementById('inOpa').value)/100;
      ctx.strokeStyle='rgba(100,100,255,'+(opa+0.2)+')';ctx.lineWidth=1.5;ctx.stroke();
    }
  }
  // ejes de referencia
  var o3=pr(0,0,mN),x3=pr(Cl-1,0,mN),y3=pr(0,0,mXX),z3=pr(0,R-1,mN);
  ctx.lineWidth=2;
  ctx.strokeStyle='#ff3333';ctx.beginPath();ctx.moveTo(o3[0],o3[1]);ctx.lineTo(x3[0],x3[1]);ctx.stroke();
  ctx.strokeStyle='#3399ff';ctx.beginPath();ctx.moveTo(o3[0],o3[1]);ctx.lineTo(y3[0],y3[1]);ctx.stroke();
  ctx.strokeStyle='#33ff33';ctx.beginPath();ctx.moveTo(o3[0],o3[1]);ctx.lineTo(z3[0],z3[1]);ctx.stroke();
  ctx.font='8px monospace';
  ctx.fillStyle='#ff3333';ctx.fillText('RPM',x3[0]+3,x3[1]+3);
  ctx.fillStyle='#3399ff';ctx.fillText('VAL',y3[0]+3,y3[1]+3);
  ctx.fillStyle='#33ff33';ctx.fillText('TPS',z3[0]+3,z3[1]-5);
  // leyenda
  var leg=document.getElementById(legId);
  if(DM==='delta'){
    leg.innerHTML='<span>-</span><div class="bar" style="background:linear-gradient(to right,rgba(30,60,255,.9),#444,rgba(255,60,60,.9))"></div><span>+</span><span style="margin-left:4px">'+dN.toFixed(1)+'/+'+dX.toFixed(1)+'</span>';
  } else {
    leg.innerHTML='<span>'+mN.toFixed(0)+'</span><div class="bar" style="background:linear-gradient(to right,rgba(15,10,80,.9),rgba(15,70,220,.9),rgba(35,200,255,.9),rgba(155,255,100,.9),rgba(255,195,30,.9),rgba(255,50,20,.9))"></div><span>'+mXX.toFixed(0)+'</span>';
  }
}
async function loadMerge(){
  if(!mB||!mM)return;
  var a=document.getElementById('sB').value,b=document.getElementById('sM').value;
  if(!a||!b)return;
  st('Calculating merge '+mergeMode+'...');
  document.getElementById('mcGo').disabled=true;
  try{
    var r=await fetch('/tuner/merge?a='+a+'&b='+b+'&mode='+mergeMode);if(!r.ok)throw Error("HTTP "+r.status);var d=await r.json();
    if(d.error){st('Merge: '+d.error);mMerge=null;render();return}
    mMerge=d;
    document.getElementById('mcDl').disabled=false;
    var warn=d.attributable?'':'⚠ not attributable: both fuel and spark changed';
    st('Merge OK: '+d.changed.join(', ')+' | '+d.cells_with_data+' celdas'+(warn?' '+warn:''));
    render();
  }catch(e){st('Error: '+e.message)}
}
function swapSessions(){
  var tmp=mB;mB=mM;mM=tmp;
  var bv=document.getElementById('sB').value,mv=document.getElementById('sM').value;
  document.getElementById('sB').value=mv;document.getElementById('sM').value=bv;
  if(mB&&mM)render();
}
document.getElementById('sB').onchange=function(){load('base')};
document.getElementById('sM').onchange=function(){load('mod')};
document.getElementById('tabs').onclick=function(e){
  var b=e.target.closest('.tab');if(!b)return;
  var all=document.querySelectorAll('.tab');for(var i=0;i<all.length;i++)all[i].classList.remove('on');
  b.classList.add('on');cur=b.dataset.m;
  render();
};
function setView(t,r,v){document.getElementById("inTps").value=t;document.getElementById("inRpm").value=r;document.getElementById("inVal").value=v;applyAngles()}
function wrap(v,mx){return((v%mx)+mx)%mx}
function fixArrow(e,mx){
  if(e.key!=='ArrowUp'&&e.key!=='ArrowDown')return;
  e.preventDefault();
  var inp=e.target,v=parseInt(inp.value)||0;
  v=e.key==='ArrowUp'?v+1:v-1;
  inp.value=wrap(v,mx);
  applyAngles();
}
function applyAngles(){
  var tps=wrap(parseInt(document.getElementById('inTps').value)||0,360);
  var rpm=wrap(parseInt(document.getElementById('inRpm').value)||0,360);
  var val=wrap(parseInt(document.getElementById('inVal').value)||0,360);
  document.getElementById('inTps').value=tps;
  document.getElementById('inRpm').value=rpm;
  document.getElementById('inVal').value=val;
  var tpsR=(tps-180)*Math.PI/180;
  var rpmR=rpm*Math.PI/180;
  var valR=-val*Math.PI/180;
  for(var k in C3){C3[k].ang=tpsR;C3[k].tilt=rpmR;C3[k].roll=valR}
  var zv=document.getElementById('zoomVal');if(zv){var zi=document.getElementById('inZoom');zv.textContent=parseFloat(zi.value).toFixed(1);}
  var ci=document.getElementById('inCam');if(ci){CAM.zoom=parseFloat(ci.value)||1;var cv=document.getElementById('camVal');if(cv)cv.textContent=CAM.zoom.toFixed(2);}
  drawAll();saveCameraState();
}

function downloadMerge(){
  if(!mMerge){st('No merge data');return}
  var blob=new Blob([JSON.stringify(mMerge,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var aId=document.getElementById('sB').value,bId=document.getElementById('sM').value;
  a.download='merge_'+aId+'_vs_'+bId+'_'+mergeMode+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('pw').addEventListener('click',function(e){
  var td=e.target.closest('td[data-ri]');
  if(!td)return;
  var ri=parseInt(td.dataset.ri),ci=parseInt(td.dataset.ci),orig=parseFloat(td.dataset.val);
  var stKey=ri+','+ci,cv=(STAGE[cur]||{})[stKey];
  stageInput(td,ri,ci,orig,cv!==undefined?cv:orig);
});
function stageInput(td,ri,ci,orig,current){
  var inp=document.getElementById('stageInp');
  if(!inp){inp=document.createElement('input');inp.id='stageInp';inp.type='number';inp.step='0.1';
    inp.style.cssText='position:fixed;background:#1a1a1a;border:1px solid var(--ac);color:#fff;font-family:var(--mn);font-size:10px;text-align:center;z-index:9999;padding:0 2px;border-radius:2px;box-sizing:border-box';
    document.body.appendChild(inp);}
  var r=td.getBoundingClientRect();
  inp.style.left=r.left+'px';inp.style.top=r.top+'px';inp.style.width=r.width+'px';inp.style.height=r.height+'px';
  inp._ri=ri;inp._ci=ci;inp._orig=orig;
  inp.value=current.toFixed(1);inp.style.display='block';inp.focus();inp.select();
  inp.onkeydown=function(e){if(e.key==='Enter'){commitStage(inp);}if(e.key==='Escape'){inp.style.display='none';}};
  inp.onblur=function(){setTimeout(function(){inp.style.display='none';},200);};
}
function commitStage(inp){
  var newVal=parseFloat(inp.value);
  if(isNaN(newVal)||newVal<0){inp.style.display='none';return;}
  var ri=inp._ri,ci=inp._ci,orig=inp._orig;
  var lo=parseFloat((orig*0.85).toFixed(1)),hi=parseFloat((orig*1.15).toFixed(1));
  if(newVal<lo||newVal>hi){setStageSt('Limit +-15%: '+lo+'-'+hi);inp.style.display='none';return;}
  if(!STAGE[cur])STAGE[cur]={};
  var stKey=ri+','+ci,isNew=!(stKey in STAGE[cur]);
  var total=Object.values(STAGE).reduce(function(s,m){return s+Object.keys(m).length;},0);
  if(isNew&&total>=MAX_STAGE_CELLS){setStageSt('Max '+MAX_STAGE_CELLS+' cells - burn or reset');inp.style.display='none';return;}
  STAGE[cur][stKey]=newVal;
  inp.style.display='none';
  updateBurnBtn();render();
  var n=Object.values(STAGE).reduce(function(s,m){return s+Object.keys(m).length;},0);
  setStageSt(n+' cell'+(n===1?'':'s')+' staged');
}
function setStageSt(t){var el=document.getElementById('stageSt');if(el)el.textContent=t;}
function updateBurnBtn(){
  var total=Object.values(STAGE).reduce(function(s,m){return s+Object.keys(m).length;},0);
  var btn=document.getElementById('burnBtn'),rst=document.getElementById('resetBtn');
  if(btn){btn.disabled=total===0;btn.style.opacity=total>0?'1':'0.4';btn.textContent=total>0?'BURN ('+total+')':'BURN';}
  if(rst){rst.disabled=total===0;rst.style.opacity=total>0?'1':'0.4';}
}
async function burnStaged(){
  var changes=[];
  for(var mk in STAGE)for(var key in STAGE[mk]){var p=key.split(',');changes.push({map:mk,ri:parseInt(p[0]),ci:parseInt(p[1]),val:STAGE[mk][key]});}
  if(!changes.length)return;
  if(!confirm('Burn '+changes.length+' change'+(changes.length===1?'':'s')+' to EEPROM?'))return;
  setStageSt('Burning...');
  try{
    var r=await fetch('/eeprom/burn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({changes:changes})});
    var d=await r.json();
    if(d.error){setStageSt('Burn failed: '+d.error);return;}
    STAGE={};updateBurnBtn();render();
    setStageSt('Burned '+(d.cells_changed||changes.length)+' cell(s). Reload page to refresh map.');
  }catch(e){setStageSt('Error: '+e.message);}
}
function resetStaged(){STAGE={};updateBurnBtn();render();setStageSt('');}
