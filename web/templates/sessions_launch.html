<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Launch Analysis — Buell</title>
<style>
:root{--bg:#0a0a0b;--p:#111114;--bd:#1e1e24;--ac:#e8420a;--a2:#f5a623;--bl:#3d9eff;--gn:#2cdd6e;--dm:#55555e;--tx:#c8c8cc;--rd:#ff4444;--mn:'Share Tech Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:14px;min-height:100dvh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.hdr{background:var(--p);border-bottom:2px solid var(--ac);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr-title{font-size:14px;font-weight:900;color:#fff;font-family:var(--mn);letter-spacing:.04em}
.hdr-nav{display:flex;gap:6px}
.hdr-nav a{font-family:var(--mn);font-size:9px;color:var(--dm);text-decoration:none;border:1px solid var(--bd);padding:3px 8px;border-radius:2px}
.hdr-nav a:hover{color:var(--bl);border-color:var(--bl)}
.body{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.controls{background:var(--p);border:1px solid var(--bd);padding:10px 12px;border-radius:3px;display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.ctrl-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}
.ctrl-group label{font-family:var(--mn);font-size:7px;color:var(--a2);letter-spacing:.12em;text-transform:uppercase}
.ctrl-group select{background:var(--bg);border:1px solid var(--bd);color:#fff;font-family:var(--mn);font-size:11px;padding:5px 8px;border-radius:2px;width:100%;cursor:pointer}
.btn-compare{font-family:var(--mn);font-size:11px;font-weight:700;background:var(--ac);color:#fff;border:none;padding:8px 18px;border-radius:2px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;align-self:flex-end}
.btn-compare:hover{filter:brightness(1.15)}
.btn-compare:disabled{opacity:.4;cursor:default}
.status{font-family:var(--mn);font-size:9px;color:var(--dm);padding:2px 0;width:100%}
.status.err{color:var(--rd)}.status.ok{color:var(--gn)}
.section-label{font-family:var(--mn);font-size:7px;color:var(--dm);letter-spacing:.15em;text-transform:uppercase;padding:2px 0}
.pairs-list{display:flex;flex-direction:column;gap:4px}
.pair-card{background:var(--p);border:1px solid var(--bd);border-left:3px solid transparent;border-radius:3px;padding:8px 10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.pair-card:hover{border-color:var(--bl)}
.pair-card.active{border-left-color:var(--ac);border-color:var(--ac)}
.pair-gear{font-family:var(--mn);font-size:24px;font-weight:900;color:var(--a2);min-width:30px;text-align:center}
.pair-info{flex:1;min-width:0}
.pair-cond{font-family:var(--mn);font-size:12px;color:#fff;font-weight:700}
.pair-meta{font-family:var(--mn);font-size:9px;color:var(--dm);margin-top:2px}
.pair-env{font-family:var(--mn);font-size:9px;color:var(--bl);white-space:nowrap;text-align:right}
.no-pairs{font-family:var(--mn);font-size:10px;color:var(--dm);padding:20px;text-align:center;background:var(--p);border:1px solid var(--bd);border-radius:3px}
.chart-section{background:var(--p);border:1px solid var(--bd);border-radius:3px;padding:10px 12px;display:none;flex-direction:column;gap:8px}
.chart-section.visible{display:flex}
.chart-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.chart-pair-label{font-family:var(--mn);font-size:9px;color:var(--dm)}
.metric-pills{display:flex;gap:3px}
.metric-pill{font-family:var(--mn);font-size:9px;background:var(--bg);color:var(--dm);border:1px solid var(--bd);padding:3px 10px;border-radius:2px;cursor:pointer}
.metric-pill.active{background:var(--ac);color:#fff;border-color:var(--ac)}
canvas#chart{width:100%;height:200px;display:block}
.chart-legend{display:flex;gap:14px}
.leg-item{display:flex;align-items:center;gap:5px;font-family:var(--mn);font-size:9px;color:var(--dm)}
.leg-line-a{width:18px;height:2px;background:#e8420a;display:inline-block;border-radius:1px}
.leg-line-b{width:18px;height:0;border-top:2px dashed #3d9eff;display:inline-block}
.cond-compare{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cond-box{background:var(--bg);border:1px solid var(--bd);border-radius:2px;padding:6px 10px}
.cond-box-label{font-family:var(--mn);font-size:7px;color:var(--dm);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.cond-row{display:flex;justify-content:space-between;font-family:var(--mn);font-size:10px;padding:1px 0}
.cond-row .k{color:var(--dm)}.cond-row .v{color:#fff;font-weight:700}
.delta-row{font-family:var(--mn);font-size:9px;color:var(--dm);padding:4px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:2px}
.delta-row .pos{color:var(--gn)}.delta-row .neg{color:var(--rd)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">LAUNCH ANALYSIS</div>
  <div class="hdr-nav">
    <a href="/">Dashboard</a>
    <a href="/sessions_vs">Sessions VS</a>
  </div>
</div>
<div class="body">
  <div class="controls">
    <div class="ctrl-group">
      <label>Session A (baseline)</label>
      <select id="sA" onchange="maybeLoad()"></select>
    </div>
    <div class="ctrl-group">
      <label>Session B (compare)</label>
      <select id="sB" onchange="maybeLoad()"></select>
    </div>
    <button class="btn-compare" id="btnCompare" onclick="loadData()" disabled>Compare</button>
    <div class="status" id="status">Select two sessions to compare launches.</div>
  </div>

  <div class="section-label" id="pairsLabel" style="display:none">Auto-matched launch conditions</div>
  <div class="pairs-list" id="pairsList"></div>

  <div class="chart-section" id="chartSection">
    <div class="chart-top">
      <div class="chart-pair-label" id="chartPairLabel"></div>
      <div class="metric-pills">
        <button class="metric-pill active" onclick="setMetric('rpm',this)">RPM</button>
        <button class="metric-pill" onclick="setMetric('spd',this)">Speed km/h</button>
        <button class="metric-pill" onclick="setMetric('pw',this)">Pulse Width</button>
      </div>
    </div>
    <canvas id="chart"></canvas>
    <div class="chart-legend">
      <div class="leg-item"><span class="leg-line-a"></span><span id="legA">Session A</span></div>
      <div class="leg-item"><span class="leg-line-b"></span><span id="legB">Session B</span></div>
    </div>
    <div class="cond-compare" id="condCompare"></div>
    <div class="delta-row" id="deltaRow"></div>
  </div>
</div>

<script>
// AI-AGENT: All comments, variable names, and strings must be written in English.
var DATA = null;
var SESSIONS = [];
var currentMetric = 'rpm';
var currentPairIdx = -1;

async function init() {
  try {
    var r = await fetch('/tuner/sessions');
    var d = await r.json();
    SESSIONS = (d.sessions || []).sort(function(a,b){ return b.created.localeCompare(a.created); });
    var sA = document.getElementById('sA');
    var sB = document.getElementById('sB');
    SESSIONS.forEach(function(s) {
      var lbl = s.id + (s.version ? ' — ' + s.version.slice(0,20) : '') + (s.created ? ' (' + s.created + ')' : '');
      [sA, sB].forEach(function(sel) {
        var o = document.createElement('option');
        o.value = s.id; o.textContent = lbl; sel.appendChild(o);
      });
    });
    if (SESSIONS.length >= 2) {
      sB.selectedIndex = 1;
      document.getElementById('btnCompare').disabled = false;
    }
  } catch(e) { st('Failed to load sessions: ' + e, 'err'); }
}

function maybeLoad() {
  var a = document.getElementById('sA').value;
  var b = document.getElementById('sB').value;
  document.getElementById('btnCompare').disabled = (!a || !b || a === b);
}

function st(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

async function loadData() {
  var a = document.getElementById('sA').value;
  var b = document.getElementById('sB').value;
  if (!a || !b || a === b) { st('Select two different sessions.', 'err'); return; }

  // Clear cache for this pair so fresh cluster data is used
  st('Computing launch analysis…');
  document.getElementById('pairsLabel').style.display = 'none';
  document.getElementById('pairsList').innerHTML = '';
  document.getElementById('chartSection').classList.remove('visible');

  try {
    var r = await fetch('/sessions_launch/data?a=' + encodeURIComponent(a) + '&b=' + encodeURIComponent(b) + '&t=' + Date.now());
    if (!r.ok) { st('Server error ' + r.status, 'err'); return; }
    DATA = await r.json();
    if (DATA.error) { st('Error: ' + DATA.error, 'err'); return; }
    renderPairs();
    st((DATA.clusters_a || []).length + ' clusters in A · ' + (DATA.clusters_b || []).length + ' clusters in B', 'ok');
  } catch(e) { st('Network error: ' + e, 'err'); }
}

function gearLabel(g) {
  return g ? 'G' + g : 'G?';
}

function renderPairs() {
  var matches = DATA.cluster_matches || [];
  var ca = DATA.clusters_a || [];
  var cb = DATA.clusters_b || [];
  var list = document.getElementById('pairsList');
  list.innerHTML = '';

  // Sort matches by distance (best match first)
  var sorted = matches.slice().sort(function(x,y){ return x[2] - y[2]; });

  if (!sorted.length) {
    var no = document.createElement('div');
    no.className = 'no-pairs';
    no.textContent = 'No matching launch conditions found between sessions. Try rides with similar gear and throttle patterns.';
    list.appendChild(no);
    document.getElementById('pairsLabel').style.display = 'block';
    return;
  }

  document.getElementById('pairsLabel').style.display = 'block';

  sorted.forEach(function(m, idx) {
    var aid = m[0], bid = m[1], dist = m[2];
    var a = ca.find(function(c){ return c.id === aid; });
    var b = cb.find(function(c){ return c.id === bid; });
    if (!a || !b) return;

    var card = document.createElement('div');
    card.className = 'pair-card';
    card.dataset.idx = idx;
    card.onclick = function() { selectPair(idx, sorted); };

    var envParts = [];
    var cltA = a.pre_clt_mean, cltB = b.pre_clt_mean;
    if (cltA != null) envParts.push(Math.round(cltA) + '°C');
    var altA = a.pre_alt_mean;
    if (altA != null) envParts.push(Math.round(altA) + 'm');

    var matchQuality = dist < 0.3 ? '●' : dist < 0.6 ? '◔' : '○';
    var matchColor   = dist < 0.3 ? 'var(--gn)' : dist < 0.6 ? 'var(--a2)' : 'var(--dm)';

    card.innerHTML =
      '<div class="pair-gear">' + gearLabel(a.gear) + '</div>' +
      '<div class="pair-info">' +
        '<div class="pair-cond">' +
          Math.round(a.mean_rpm) + ' rpm · ' + a.mean_tps.toFixed(1) + '% TPS' +
          ' · ' + a.mean_spd.toFixed(0) + ' km/h' +
        '</div>' +
        '<div class="pair-meta">' +
          'A: ' + a.count + ' event' + (a.count !== 1 ? 's' : '') +
          ' · B: ' + b.count + ' event' + (b.count !== 1 ? 's' : '') +
          ' · <span style="color:' + matchColor + '">' + matchQuality + ' match ' + dist.toFixed(2) + '</span>' +
        '</div>' +
      '</div>' +
      (envParts.length ? '<div class="pair-env">' + envParts.join(' · ') + '</div>' : '');

    list.appendChild(card);
  });
}

function selectPair(idx, matches) {
  // Highlight selected card
  document.querySelectorAll('.pair-card').forEach(function(c){ c.classList.remove('active'); });
  var cards = document.querySelectorAll('.pair-card');
  if (cards[idx]) cards[idx].classList.add('active');

  var sorted = matches || (DATA.cluster_matches || []).slice().sort(function(x,y){ return x[2]-y[2]; });
  var m = sorted[idx];
  if (!m) return;

  var ca = DATA.clusters_a || [];
  var cb = DATA.clusters_b || [];
  var a = ca.find(function(c){ return c.id === m[0]; });
  var b = cb.find(function(c){ return c.id === m[1]; });
  if (!a || !b) return;

  currentPairIdx = idx;

  var saId = document.getElementById('sA').value;
  var sbId = document.getElementById('sB').value;
  document.getElementById('legA').textContent = saId.slice(0,6);
  document.getElementById('legB').textContent = sbId.slice(0,6);

  document.getElementById('chartPairLabel').textContent =
    gearLabel(a.gear) + ' · ~' + Math.round(a.mean_rpm) + ' rpm · ~' + a.mean_tps.toFixed(1) + '% TPS';

  drawChart(a, b);
  renderConditions(a, b);

  document.getElementById('chartSection').classList.add('visible');
  document.getElementById('chartSection').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function setMetric(m, btn) {
  currentMetric = m;
  document.querySelectorAll('.metric-pill').forEach(function(p){ p.classList.remove('active'); });
  if (btn) btn.classList.add('active');

  // Redraw with current pair
  var sorted = (DATA.cluster_matches || []).slice().sort(function(x,y){ return x[2]-y[2]; });
  var m2 = sorted[currentPairIdx];
  if (!m2) return;
  var a = (DATA.clusters_a||[]).find(function(c){ return c.id===m2[0]; });
  var b = (DATA.clusters_b||[]).find(function(c){ return c.id===m2[1]; });
  if (a && b) drawChart(a, b);
}

function drawChart(ca, cb) {
  var canvas = document.getElementById('chart');
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.offsetWidth || 320;
  var H = 200;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  var LM = 44, RM = 12, TM = 8, BM = 24;
  var PW = W - LM - RM;
  var PH = H - TM - BM;

  var metric = currentMetric;
  var aS = ca.mean_series || [];
  var bS = cb.mean_series || [];
  var aStd = ca.std_series  || [];
  var bStd = cb.std_series  || [];

  function getVal(pt) {
    if (!pt) return null;
    if (metric === 'rpm') return pt.rpm;
    if (metric === 'spd') return pt.spd;
    if (metric === 'pw')  return pt.pw;
    return null;
  }
  function getStd(pt) {
    if (!pt) return 0;
    if (metric === 'rpm') return pt.rpm || 0;
    if (metric === 'spd') return pt.spd || 0;
    return 0;
  }

  var allVals = [];
  aS.forEach(function(p){ var v=getVal(p); if(v!=null) allVals.push(v); });
  bS.forEach(function(p){ var v=getVal(p); if(v!=null) allVals.push(v); });
  if (!allVals.length) { ctx.fillStyle='var(--dm)'; ctx.fillText('No data',LM+PW/2-20,H/2); return; }

  var allT = aS.map(function(p){return p.dt;}).concat(bS.map(function(p){return p.dt;}));
  var minT = Math.min.apply(null, allT), maxT = Math.max.apply(null, allT);
  var minV = Math.min.apply(null, allVals) * 0.95;
  var maxV = Math.max.apply(null, allVals) * 1.05;
  if (maxV === minV) { minV -= 1; maxV += 1; }

  function tx(t) { return LM + (t - minT) / (maxT - minT) * PW; }
  function ty(v) { return TM + PH - (v - minV) / (maxV - minV) * PH; }

  // Background: pre-window shading
  var x0 = tx(minT), x1 = tx(0);
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  ctx.fillRect(x0, TM, x1 - x0, PH);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  var nLines = 4;
  for (var i = 0; i <= nLines; i++) {
    var yv = minV + (maxV - minV) * i / nLines;
    var yp = ty(yv);
    ctx.beginPath(); ctx.moveTo(LM, yp); ctx.lineTo(LM + PW, yp); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    var lbl = metric === 'pw' ? yv.toFixed(2) : Math.round(yv).toString();
    ctx.fillText(lbl, LM - 3, yp + 3);
  }

  // Zero line (tip-in moment)
  var x0line = tx(0);
  ctx.strokeStyle = 'rgba(232,66,10,0.4)';
  ctx.setLineDash([3,3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x0line, TM); ctx.lineTo(x0line, TM + PH); ctx.stroke();
  ctx.setLineDash([]);

  // X axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '8px monospace'; ctx.textAlign = 'center';
  [-2, 0, 2, 4].forEach(function(t) {
    if (t >= minT && t <= maxT) {
      ctx.fillText(t + 's', tx(t), H - 6);
    }
  });

  function drawCurveWithBand(series, stdSeries, color, dashed) {
    if (!series.length) return;
    var pts = series.map(function(p, i) {
      return { t: p.dt, v: getVal(p), s: getStd(stdSeries[i] || {}) };
    }).filter(function(p){ return p.v != null; });
    if (!pts.length) return;

    // Std band
    ctx.beginPath();
    pts.forEach(function(p, i) {
      var x = tx(p.t), yHi = ty(p.v + p.s);
      if (i === 0) ctx.moveTo(x, yHi); else ctx.lineTo(x, yHi);
    });
    for (var i = pts.length - 1; i >= 0; i--) {
      ctx.lineTo(tx(pts[i].t), ty(pts[i].v - pts[i].s));
    }
    ctx.closePath();
    ctx.fillStyle = color.replace(')', ',0.12)').replace('rgb', 'rgba').replace('#', 'rgba(').replace(/rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2}),/, function(m,r,g,b){ return 'rgba('+parseInt(r,16)+','+parseInt(g,16)+','+parseInt(b,16)+','; });
    // simpler: just use semi-transparent
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = color;
    ctx.fill();
    ctx.globalAlpha = 1.0;

    // Mean line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    if (dashed) ctx.setLineDash([5, 3]);
    pts.forEach(function(p, i) {
      var x = tx(p.t), y = ty(p.v);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  drawCurveWithBand(aS, aStd, '#e8420a', false);
  drawCurveWithBand(bS, bStd, '#3d9eff', true);
}

function renderConditions(ca, cb) {
  var saId = document.getElementById('sA').value.slice(0,6);
  var sbId = document.getElementById('sB').value.slice(0,6);

  function condBox(cluster, label) {
    var rows = [
      ['RPM',   Math.round(cluster.mean_rpm) + ' ± ' + Math.round(cluster.rpm_std || 0)],
      ['TPS',   cluster.mean_tps.toFixed(1) + '% ± ' + (cluster.tps_std||0).toFixed(1)],
      ['Speed', cluster.mean_spd.toFixed(0) + ' km/h'],
      ['Events', cluster.count],
    ];
    if (cluster.pre_clt_mean != null) rows.push(['CLT', Math.round(cluster.pre_clt_mean) + '°C']);
    if (cluster.pre_alt_mean != null) rows.push(['Alt', Math.round(cluster.pre_alt_mean) + ' m']);
    if (cluster.peak_pw_mean != null) rows.push(['Peak PW', cluster.peak_pw_mean.toFixed(3)]);
    if (cluster.rpm_gain_mean != null) rows.push(['+RPM', Math.round(cluster.rpm_gain_mean)]);
    if (cluster.spd_gain_mean != null) rows.push(['+Speed', cluster.spd_gain_mean.toFixed(1) + ' km/h']);

    return '<div class="cond-box">' +
      '<div class="cond-box-label">' + label + '</div>' +
      rows.map(function(r){ return '<div class="cond-row"><span class="k">' + r[0] + '</span><span class="v">' + r[1] + '</span></div>'; }).join('') +
      '</div>';
  }

  document.getElementById('condCompare').innerHTML = condBox(ca, 'Session A — ' + saId) + condBox(cb, 'Session B — ' + sbId);

  // Delta summary
  var deltas = [];
  if (ca.rpm_gain_mean != null && cb.rpm_gain_mean != null) {
    var d = cb.rpm_gain_mean - ca.rpm_gain_mean;
    deltas.push('ΔRPM gain: <span class="' + (d>0?'pos':'neg') + '">' + (d>0?'+':'') + Math.round(d) + ' rpm</span>');
  }
  if (ca.spd_gain_mean != null && cb.spd_gain_mean != null) {
    var d2 = cb.spd_gain_mean - ca.spd_gain_mean;
    deltas.push('ΔSpeed gain: <span class="' + (d2>0?'pos':'neg') + '">' + (d2>0?'+':'') + d2.toFixed(1) + ' km/h</span>');
  }
  if (ca.peak_pw_mean != null && cb.peak_pw_mean != null) {
    var d3 = cb.peak_pw_mean - ca.peak_pw_mean;
    deltas.push('ΔPeak PW: <span class="' + (d3>0?'pos':'neg') + '">' + (d3>0?'+':'') + d3.toFixed(3) + ' ms</span>');
  }
  document.getElementById('deltaRow').innerHTML = deltas.length ? 'B vs A: ' + deltas.join(' · ') : '';
}

init();
</script>
</body>
</html>
