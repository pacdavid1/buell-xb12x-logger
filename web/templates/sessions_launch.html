<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Launch Analysis — Buell</title>
<style>
:root{--bg:#0a0a0b;--p:#111114;--bd:#1e1e24;--ac:#e8420a;--a2:#f5a623;--bl:#3d9eff;--gn:#2cdd6e;--dm:#55555e;--tx:#c8c8cc;--rd:#ff4444;--mn:'Share Tech Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:14px;min-height:100dvh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.hdr{background:var(--p);border-bottom:2px solid var(--ac);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr-title{font-size:14px;font-weight:900;color:#fff;font-family:var(--mn);letter-spacing:.04em}
.hdr-nav{display:flex;gap:6px}
.hdr-nav a{font-family:var(--mn);font-size:9px;color:var(--dm);text-decoration:none;border:1px solid var(--bd);padding:3px 8px;border-radius:2px}
.hdr-nav a:hover{color:var(--bl);border-color:var(--bl)}
.body{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.controls{background:var(--p);border:1px solid var(--bd);padding:10px 12px;border-radius:3px;display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.ctrl-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}
.ctrl-group label{font-family:var(--mn);font-size:7px;color:var(--a2);letter-spacing:.12em;text-transform:uppercase}
.ctrl-group select{background:var(--bg);border:1px solid var(--bd);color:#fff;font-family:var(--mn);font-size:11px;padding:5px 8px;border-radius:2px;width:100%;cursor:pointer}
.btn-compare{font-family:var(--mn);font-size:11px;font-weight:700;background:var(--ac);color:#fff;border:none;padding:8px 18px;border-radius:2px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;align-self:flex-end}
.btn-compare:hover{filter:brightness(1.15)}
.btn-compare:disabled{opacity:.4;cursor:default}
.status{font-family:var(--mn);font-size:9px;color:var(--dm);padding:2px 0;width:100%}
.status.err{color:var(--rd)}.status.ok{color:var(--gn)}
.section-label{font-family:var(--mn);font-size:7px;color:var(--dm);letter-spacing:.15em;text-transform:uppercase;padding:2px 0}
.pairs-list{display:flex;flex-direction:column;gap:4px}
.pair-card{background:var(--p);border:1px solid var(--bd);border-left:3px solid transparent;border-radius:3px;padding:8px 10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.pair-card:hover{border-color:var(--bl)}
.pair-card.active{border-left-color:var(--ac);border-color:var(--ac)}
.pair-gear{font-family:var(--mn);font-size:24px;font-weight:900;color:var(--a2);min-width:30px;text-align:center}
.pair-info{flex:1;min-width:0}
.pair-cond{font-family:var(--mn);font-size:12px;color:#fff;font-weight:700}
.pair-meta{font-family:var(--mn);font-size:9px;color:var(--dm);margin-top:2px}
.pair-env{font-family:var(--mn);font-size:9px;color:var(--bl);white-space:nowrap;text-align:right}
.no-pairs{font-family:var(--mn);font-size:10px;color:var(--dm);padding:20px;text-align:center;background:var(--p);border:1px solid var(--bd);border-radius:3px}
/* Chart section */
.chart-section{background:var(--p);border:1px solid var(--bd);border-radius:3px;padding:10px 12px;display:none;flex-direction:column;gap:8px}
.chart-section.visible{display:flex}
.chart-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px}
.chart-pair-label{font-family:var(--mn);font-size:9px;color:var(--dm)}
/* Metric toggles */
.metric-toggles{display:flex;gap:4px;flex-wrap:wrap}
.mtog{display:flex;align-items:center;gap:4px;padding:3px 9px;border:1px solid var(--bd);border-radius:2px;background:var(--bg);font-family:var(--mn);font-size:9px;color:var(--dm);cursor:pointer;transition:all .15s}
.mtog:hover{border-color:var(--mc,#fff);color:var(--mc,#fff)}
.mtog.active{border-color:var(--mc,#fff);color:var(--mc,#fff);background:color-mix(in srgb,var(--mc,#fff) 10%,transparent)}
.mtog-dot{width:7px;height:7px;border-radius:50%;background:var(--mc,#888);flex-shrink:0}
.mtog:not(.active) .mtog-dot{background:var(--dm)}
canvas#chart{width:100%;display:block}
/* Session legend */
.sess-legend{display:flex;gap:14px}
.sleg{display:flex;align-items:center;gap:5px;font-family:var(--mn);font-size:9px;color:var(--dm)}
.sleg-a{width:20px;height:2px;background:#ccc;display:inline-block;border-radius:1px}
.sleg-b{width:20px;height:0;border-top:2px dashed #ccc;display:inline-block}
/* Conditions */
.cond-compare{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cond-box{background:var(--bg);border:1px solid var(--bd);border-radius:2px;padding:6px 10px}
.cond-box-label{font-family:var(--mn);font-size:7px;color:var(--dm);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.cond-row{display:flex;justify-content:space-between;font-family:var(--mn);font-size:10px;padding:1px 0}
.cond-row .k{color:var(--dm)}.cond-row .v{color:#fff;font-weight:700}
.delta-row{font-family:var(--mn);font-size:9px;color:var(--dm);padding:4px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:2px}
.delta-row .pos{color:var(--gn)}.delta-row .neg{color:var(--rd)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">LAUNCH ANALYSIS</div>
  <div class="hdr-nav">
    <a href="/">Dashboard</a>
    <a href="/sessions_vs">Sessions VS</a>
  </div>
</div>
<div class="body">
  <div class="controls">
    <div class="ctrl-group">
      <label>Session A (baseline)</label>
      <select id="sA" onchange="maybeLoad()"></select>
    </div>
    <div class="ctrl-group">
      <label>Session B (compare)</label>
      <select id="sB" onchange="maybeLoad()"></select>
    </div>
    <button class="btn-compare" id="btnCompare" onclick="loadData()" disabled>Compare</button>
    <div class="status" id="status">Select two sessions to compare launches.</div>
  </div>

  <div class="section-label" id="pairsLabel" style="display:none">Auto-matched launch conditions</div>
  <div class="pairs-list" id="pairsList"></div>

  <div class="chart-section" id="chartSection">
    <div class="chart-top">
      <div class="chart-pair-label" id="chartPairLabel"></div>
      <div class="metric-toggles" id="metricToggles"></div>
    </div>
    <canvas id="chart"></canvas>
    <div class="sess-legend">
      <div class="sleg"><span class="sleg-a"></span><span id="legA">Session A</span></div>
      <div class="sleg"><span class="sleg-b"></span><span id="legB">Session B (dashed)</span></div>
    </div>
    <div class="cond-compare" id="condCompare"></div>
    <div class="delta-row" id="deltaRow"></div>
  </div>
</div>

<script>
// AI-AGENT: All comments and variable names must be written in English.
var DATA = null;
var SESSIONS = [];
var currentPairIdx = -1;
var currentPairA = null;
var currentPairB = null;

// Metric definitions: key -> {label, color, field, fmt}
var METRICS = {
  rpm: { label:'RPM',   color:'#ff4444', field:'rpm', fmt:function(v){ return Math.round(v); } },
  spd: { label:'km/h',  color:'#3d9eff', field:'spd', fmt:function(v){ return v.toFixed(0); } },
  pw:  { label:'PW ms', color:'#f5a623', field:'pw',  fmt:function(v){ return v.toFixed(2); } },
  tps: { label:'TPS %', color:'#2cdd6e', field:'tps', fmt:function(v){ return v.toFixed(1); } },
  ae:  { label:'AE %',  color:'#c084fc', field:'ae',  fmt:function(v){ return v.toFixed(1); } },
  alt: { label:'Alt m', color:'#84cc16', field:'alt', fmt:function(v){ return Math.round(v); } },
};
// Default active metrics
var activeMetrics = ['rpm', 'spd', 'pw'];

// Responsive chart height: taller on desktop, compact on mobile
function chartHeight() {
  var w = window.innerWidth || 390;
  var h = window.innerHeight || 700;
  if (w >= 1200) return Math.min(Math.round(h * 0.52), 520);
  if (w >= 768)  return Math.min(Math.round(h * 0.44), 380);
  return 240;
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  try {
    var r = await fetch('/tuner/sessions');
    var d = await r.json();
    SESSIONS = (d.sessions || []).sort(function(a,b){ return b.created.localeCompare(a.created); });
    var sA = document.getElementById('sA');
    var sB = document.getElementById('sB');
    SESSIONS.forEach(function(s) {
      var lbl = s.id + (s.version ? ' — ' + s.version.slice(0,20) : '') + (s.created ? ' (' + s.created + ')' : '');
      [sA,sB].forEach(function(sel){
        var o = document.createElement('option');
        o.value = s.id; o.textContent = lbl; sel.appendChild(o);
      });
    });
    if (SESSIONS.length >= 2) { sB.selectedIndex = 1; document.getElementById('btnCompare').disabled = false; }
  } catch(e) { st('Failed to load sessions: ' + e, 'err'); }
}

function maybeLoad() {
  var a = document.getElementById('sA').value;
  var b = document.getElementById('sB').value;
  document.getElementById('btnCompare').disabled = (!a || !b || a === b);
}

function st(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// ── Load & render pairs ──────────────────────────────────────────
async function loadData() {
  var a = document.getElementById('sA').value;
  var b = document.getElementById('sB').value;
  if (!a || !b || a === b) { st('Select two different sessions.', 'err'); return; }
  st('Computing launch analysis…');
  document.getElementById('pairsLabel').style.display = 'none';
  document.getElementById('pairsList').innerHTML = '';
  document.getElementById('chartSection').classList.remove('visible');

  try {
    var r = await fetch('/sessions_launch/data?a=' + encodeURIComponent(a) + '&b=' + encodeURIComponent(b) + '&t=' + Date.now());
    if (!r.ok) { st('Server error ' + r.status, 'err'); return; }
    DATA = await r.json();
    if (DATA.error) { st('Error: ' + DATA.error, 'err'); return; }
    renderPairs();
    st((DATA.clusters_a||[]).length + ' clusters A · ' + (DATA.clusters_b||[]).length + ' clusters B · ' + (DATA.cluster_matches||[]).length + ' matched', 'ok');
  } catch(e) { st('Network error: ' + e, 'err'); }
}

function gearLabel(g) { return g ? 'G' + g : 'G?'; }

function renderPairs() {
  var matches = (DATA.cluster_matches || []).slice().sort(function(x,y){ return x[2]-y[2]; });
  var ca = DATA.clusters_a || [];
  var cb = DATA.clusters_b || [];
  var list = document.getElementById('pairsList');
  list.innerHTML = '';

  if (!matches.length) {
    var no = document.createElement('div');
    no.className = 'no-pairs';
    no.textContent = 'No matching conditions found. Try sessions with similar gear and throttle patterns.';
    list.appendChild(no);
    document.getElementById('pairsLabel').style.display = 'block';
    return;
  }

  document.getElementById('pairsLabel').style.display = 'block';
  matches.forEach(function(m, idx) {
    var a = ca.find(function(c){ return c.id === m[0]; });
    var b = cb.find(function(c){ return c.id === m[1]; });
    if (!a || !b) return;

    var dist = m[2];
    var qCol = dist < 0.3 ? 'var(--gn)' : dist < 0.7 ? 'var(--a2)' : 'var(--dm)';
    var qMark = dist < 0.3 ? '●' : dist < 0.7 ? '◑' : '○';

    var envParts = [];
    if (a.pre_clt_mean != null) envParts.push(Math.round(a.pre_clt_mean) + '°C');
    if (a.pre_alt_mean != null) envParts.push(Math.round(a.pre_alt_mean) + 'm');

    var card = document.createElement('div');
    card.className = 'pair-card';
    card.onclick = (function(i, ma, mb){ return function(){ selectPair(i, ma, mb, matches); }; })(idx, a, b);
    card.innerHTML =
      '<div class="pair-gear">' + gearLabel(a.gear) + '</div>' +
      '<div class="pair-info">' +
        '<div class="pair-cond">' + Math.round(a.mean_rpm) + ' rpm · ' + a.mean_tps.toFixed(1) + '% TPS · ' + a.mean_spd.toFixed(0) + ' km/h</div>' +
        '<div class="pair-meta">A: ' + a.count + ' · B: ' + b.count + ' · <span style="color:' + qCol + '">' + qMark + ' ' + dist.toFixed(2) + '</span></div>' +
      '</div>' +
      (envParts.length ? '<div class="pair-env">' + envParts.join(' · ') + '</div>' : '');
    list.appendChild(card);
  });
}

// ── Select pair & draw ───────────────────────────────────────────
function selectPair(idx, a, b, matches) {
  document.querySelectorAll('.pair-card').forEach(function(c,i){ c.classList.toggle('active', i===idx); });
  currentPairIdx = idx;
  currentPairA = a;
  currentPairB = b;

  var saId = document.getElementById('sA').value;
  var sbId = document.getElementById('sB').value;
  document.getElementById('legA').textContent = 'Session A — ' + saId.slice(0,6);
  document.getElementById('legB').textContent = 'Session B — ' + sbId.slice(0,6) + ' (dashed)';
  document.getElementById('chartPairLabel').textContent = gearLabel(a.gear) + ' · ~' + Math.round(a.mean_rpm) + ' rpm · ~' + a.mean_tps.toFixed(1) + '% TPS';

  buildToggles();
  drawChart(a, b);
  renderConditions(a, b);

  document.getElementById('chartSection').classList.add('visible');
  document.getElementById('chartSection').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── Metric toggles ───────────────────────────────────────────────
function buildToggles() {
  var container = document.getElementById('metricToggles');
  container.innerHTML = '';
  Object.keys(METRICS).forEach(function(k) {
    var m = METRICS[k];
    var isActive = activeMetrics.indexOf(k) >= 0;
    var btn = document.createElement('button');
    btn.className = 'mtog' + (isActive ? ' active' : '');
    btn.style.setProperty('--mc', m.color);
    btn.dataset.key = k;
    btn.innerHTML = '<span class="mtog-dot"></span>' + m.label;
    btn.onclick = function(){ toggleMetric(k); };
    container.appendChild(btn);
  });
}

function toggleMetric(k) {
  var idx = activeMetrics.indexOf(k);
  if (idx >= 0) {
    if (activeMetrics.length <= 1) return; // keep at least one
    activeMetrics.splice(idx, 1);
  } else {
    activeMetrics.push(k);
  }
  buildToggles();
  if (currentPairA && currentPairB) drawChart(currentPairA, currentPairB);
}

// ── Multi-axis distributed chart ─────────────────────────────────
function drawChart(ca, cb) {
  var canvas = document.getElementById('chart');
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.offsetWidth || 340;
  var H = chartHeight();
  canvas.style.height = H + 'px';
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  var active = activeMetrics.filter(function(k){ return METRICS[k]; });
  var N = active.length;
  if (!N) return;

  var TM = 16, BM = 20, LM = 6, RM = 6;
  var PW = W - LM - RM;
  var PH = H - TM - BM;

  // Compute Y scale per metric from both sessions
  var scales = {};
  active.forEach(function(k) {
    var field = METRICS[k].field;
    var vals = [];
    [ca.mean_series, ca.std_series, cb.mean_series, cb.std_series].forEach(function(arr) {
      (arr || []).forEach(function(p) {
        var v = p ? p[field] : null;
        if (v != null) vals.push(v);
      });
    });
    if (!vals.length) { scales[k] = {min:0, max:1}; return; }
    var mn = Math.min.apply(null, vals);
    var mx = Math.max.apply(null, vals);
    var pad = Math.max((mx - mn) * 0.15, 0.5);
    scales[k] = {min: mn - pad, max: mx + pad};
  });

  // Time range
  var allT = [];
  [ca.mean_series, cb.mean_series].forEach(function(s){
    (s||[]).forEach(function(p){ if(p && p.dt != null) allT.push(p.dt); });
  });
  if (!allT.length) return;
  var minT = Math.min.apply(null, allT);
  var maxT = Math.max.apply(null, allT);
  if (maxT === minT) { maxT += 1; }

  function tx(t) { return LM + (t - minT) / (maxT - minT) * PW; }
  function ty(k, v) {
    var s = scales[k];
    return TM + PH - (v - s.min) / (s.max - s.min) * PH;
  }

  // Pre-window shading (dt < 0)
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(tx(minT), TM, tx(0) - tx(minT), PH);

  // Horizontal grid (faint)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var yg = TM + PH * g / 4;
    ctx.beginPath(); ctx.moveTo(LM, yg); ctx.lineTo(LM + PW, yg); ctx.stroke();
  }

  // X axis time ticks
  ctx.font = '7px monospace'; ctx.textAlign = 'center';
  [-3,-2,-1,0,1,2,3,4,5].forEach(function(t) {
    if (t < minT - 0.1 || t > maxT + 0.1) return;
    var x = tx(t);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, TM); ctx.lineTo(x, TM + PH); ctx.stroke();
    ctx.fillStyle = t === 0 ? 'rgba(232,66,10,0.7)' : 'rgba(255,255,255,0.25)';
    ctx.fillText(t + 's', x, H - 5);
  });

  // Tip-in marker
  var x0 = tx(0);
  ctx.strokeStyle = 'rgba(232,66,10,0.4)';
  ctx.setLineDash([3,3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x0, TM); ctx.lineTo(x0, TM + PH); ctx.stroke();
  ctx.setLineDash([]);

  // ── Distributed Y axes ────────────────────────────────────────
  // Each metric gets section width PW/N; axis drawn at left edge of section
  active.forEach(function(k, i) {
    var m = METRICS[k];
    var s = scales[k];
    var axX = LM + (i / N) * PW;        // left edge of this section
    var sW  = PW / N;                    // section width

    // Subtle axis line
    ctx.strokeStyle = m.color;
    ctx.globalAlpha = 0.18;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(axX, TM); ctx.lineTo(axX, TM + PH); ctx.stroke();
    ctx.globalAlpha = 1.0;

    // Metric label at top of axis
    ctx.fillStyle = m.color;
    ctx.globalAlpha = 0.85;
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(m.label, axX + 2, TM + 8);
    ctx.globalAlpha = 1.0;

    // Tick labels (4 ticks, avoid crowding by checking section width)
    var nTicks = sW < 55 ? 3 : 4;
    for (var t = 0; t <= nTicks; t++) {
      var v = s.min + (s.max - s.min) * t / nTicks;
      var yp = TM + PH - (v - s.min) / (s.max - s.min) * PH;

      // Tick mark on axis
      ctx.strokeStyle = m.color;
      ctx.globalAlpha = 0.45;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(axX - 3, yp); ctx.lineTo(axX + 3, yp); ctx.stroke();
      ctx.globalAlpha = 1.0;

      // Value label (right of axis line, within section)
      ctx.fillStyle = m.color;
      ctx.globalAlpha = 0.65;
      ctx.font = '6px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(m.fmt(v), axX + 4, yp + 2);
      ctx.globalAlpha = 1.0;
    }
  });

  // ── Draw curves ───────────────────────────────────────────────
  function drawSeriesCurve(series, stdSeries, metricKey, dashed) {
    var field = METRICS[metricKey].field;
    var color = METRICS[metricKey].color;
    var pts = [];
    (series || []).forEach(function(p, i) {
      if (!p || p[field] == null) return;
      var stdPt = stdSeries && stdSeries[i] ? stdSeries[i] : {};
      pts.push({ t: p.dt, v: p[field], s: stdPt[field] || 0 });
    });
    if (!pts.length) return;

    // Std band
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = color;
    ctx.beginPath();
    pts.forEach(function(p, i) {
      var x = tx(p.t), y = ty(metricKey, p.v + p.s);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    for (var i = pts.length - 1; i >= 0; i--) {
      ctx.lineTo(tx(pts[i].t), ty(metricKey, pts[i].v - pts[i].s));
    }
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1.0;

    // Mean line
    ctx.strokeStyle = color;
    ctx.lineWidth = dashed ? 1.5 : 2.0;
    ctx.globalAlpha = dashed ? 0.75 : 1.0;
    if (dashed) ctx.setLineDash([5,3]);
    ctx.beginPath();
    pts.forEach(function(p, i) {
      var x = tx(p.t), y = ty(metricKey, p.v);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1.0;
  }

  active.forEach(function(k) {
    drawSeriesCurve(ca.mean_series, ca.std_series, k, false); // A: solid
    drawSeriesCurve(cb.mean_series, cb.std_series, k, true);  // B: dashed
  });
}

// ── Conditions comparison ────────────────────────────────────────
function renderConditions(ca, cb) {
  var saId = document.getElementById('sA').value.slice(0,6);
  var sbId = document.getElementById('sB').value.slice(0,6);

  function condBox(c, label) {
    var rows = [
      ['Gear',    gearLabel(c.gear)],
      ['RPM',     Math.round(c.mean_rpm) + ' ±' + Math.round(c.rpm_std||0)],
      ['TPS',     c.mean_tps.toFixed(1) + '% ±' + (c.tps_std||0).toFixed(1)],
      ['Speed',   c.mean_spd.toFixed(0) + ' km/h'],
      ['Events',  c.count],
    ];
    if (c.pre_clt_mean  != null) rows.push(['CLT',  Math.round(c.pre_clt_mean)  + '°C']);
    if (c.pre_alt_mean  != null) rows.push(['Alt',  Math.round(c.pre_alt_mean)  + ' m']);
    if (c.peak_pw_mean  != null) rows.push(['PW pk', c.peak_pw_mean.toFixed(3) + ' ms']);
    if (c.rpm_gain_mean != null) rows.push(['+RPM', '+' + Math.round(c.rpm_gain_mean)]);
    if (c.spd_gain_mean != null) rows.push(['+Spd', '+' + c.spd_gain_mean.toFixed(1) + ' km/h']);
    return '<div class="cond-box"><div class="cond-box-label">' + label + '</div>' +
      rows.map(function(r){ return '<div class="cond-row"><span class="k">' + r[0] + '</span><span class="v">' + r[1] + '</span></div>'; }).join('') +
      '</div>';
  }

  document.getElementById('condCompare').innerHTML = condBox(ca, 'A — ' + saId) + condBox(cb, 'B — ' + sbId);

  // Delta row (B minus A)
  var d = [];
  function delta(label, va, vb, fmt, higherIsBetter) {
    if (va == null || vb == null) return;
    var diff = vb - va;
    var cls = (diff > 0) === higherIsBetter ? 'pos' : 'neg';
    d.push(label + ': <span class="' + cls + '">' + (diff > 0 ? '+' : '') + fmt(diff) + '</span>');
  }
  delta('ΔRPM gain',  ca.rpm_gain_mean,  cb.rpm_gain_mean,  function(v){ return Math.round(v); }, true);
  delta('ΔSpd gain',  ca.spd_gain_mean,  cb.spd_gain_mean,  function(v){ return v.toFixed(1)+'km/h'; }, true);
  delta('ΔPeak PW',   ca.peak_pw_mean,   cb.peak_pw_mean,   function(v){ return v.toFixed(3)+'ms'; }, true);
  document.getElementById('deltaRow').innerHTML = d.length ? 'B vs A — ' + d.join(' · ') : '';
}

init();

// Redraw chart on resize (debounced)
var _resizeTimer = null;
window.addEventListener('resize', function() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(function() {
    if (currentPairA && currentPairB) drawChart(currentPairA, currentPairB);
  }, 150);
});
</script>
